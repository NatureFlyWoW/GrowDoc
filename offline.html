<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2d5016">
  <title>Offline — GrowDoc</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #333;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      max-width: 480px;
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
      border-top: 4px solid #2d5016;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 1.5rem;
      color: #2d5016;
    }
    p {
      line-height: 1.6;
      color: #555;
      margin: 0 0 12px;
    }
    .reload-btn {
      margin-top: 24px;
      padding: 12px 32px;
      background: #2d5016;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    .reload-btn:hover {
      background: #1f3a0f;
    }
    .leaf {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="leaf">🌿</div>
    <h1>You're offline</h1>
    <p>Your grow data is saved locally and still works — tasks, journal, plant doctor, and knowledge base all continue to function from cache.</p>
    <p>Online features (admin save, knowledge base updates) will return when you're back online.</p>
    <button class="reload-btn" onclick="location.reload()">Reload</button>
  </div>
</body>
</html>
