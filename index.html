<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>GrowDoc Companion</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2d5016">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GrowDoc">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="/icon-192.svg">
  <!-- Section 10: modulepreload critical-path JS so the parser can
       fetch them in parallel with the main HTML parse -->
  <link rel="modulepreload" href="/js/main.js">
  <link rel="modulepreload" href="/js/store.js">
  <link rel="modulepreload" href="/js/router.js">
  <link rel="modulepreload" href="/js/storage.js">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/note-contextualizer.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/onboarding.css">
  <link rel="stylesheet" href="/css/timeline.css">
  <link rel="stylesheet" href="/css/tasks.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/knowledge.css">
</head>
<body>
  <div class="app-shell" id="app-shell">
    <nav id="sidebar" aria-label="Main navigation"></nav>
    <main id="content"></main>
  </div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
