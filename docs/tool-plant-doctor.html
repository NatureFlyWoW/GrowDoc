  html += '<select class="plant-form-input" id="pf-lighting">';
  html += '<option value="">Select...</option><option value="led">LED</option><option value="hps">HPS</option><option value="cfl">CFL</option><option value="sunlight">Sunlight</option>';
  html += '</select></div>';
  html += '<div class="plant-form-row">';
  html += '<button class="btn btn-primary" id="pf-save" type="button">Add Plant</button>';
  html += '<button class="btn btn-secondary" id="pf-cancel" type="button">Cancel</button>';
  html += '</div></div>';

  // Focus name field
  var nameInput = document.getElementById('pf-name');
  if (nameInput) nameInput.focus();

  // Save handler
  var saveBtn = document.getElementById('pf-save');
  if (saveBtn) {
    saveBtn.addEventListener('click', function() {
      var name = document.getElementById('pf-name').value.trim();

        document.getElementById('pf-name').style.borderColor = 'var(--red)';

      }

/* ── Main Render ── */
function render() {
  var app = document.getElementById('app');
  var progressEl = document.getElementById('progress');

  // Render plant sidebar
  renderPlantSidebar();

  // Update grow profile badges
  var badgesEl = document.getElementById('grow-badges');
  if (badgesEl) badgesEl.innerHTML = renderGrowBadges();
  var mediumBadge = document.getElementById('badge-medium');
  if (mediumBadge) {
    mediumBadge.addEventListener('click', function() {
      pushUndo('profile');
      state.currentNode = 'q-medium';
      state.history = [];
      delete state.expertSelections['q-medium'];
      delete state.expertSelections['q-lighting'];
      transitionToNode('q-medium');
    });
  }
  var lightingBadge = document.getElementById('badge-lighting');
  if (lightingBadge) {
    lightingBadge.addEventListener('click', function() {
      pushUndo('profile');
      state.currentNode = 'q-lighting';
      state.history = ['q-medium'];
      delete state.expertSelections['q-lighting'];
      transitionToNode('q-lighting');
    });
  }

  // Render undo button if available
  var undoBtnEl = document.getElementById('btn-undo');
  if (!undoBtnEl) {
    var undoBadgesEl = document.getElementById('grow-badges');
    if (undoBadgesEl) {
      var undoBtn = document.createElement('button');
      undoBtn.id = 'btn-undo';
      undoBtn.className = 'btn-undo';
      undoBtn.type = 'button';
      undoBtn.style.display = 'none';
      undoBtn.setAttribute('aria-label', 'Undo last action');
      undoBadgesEl.parentElement.appendChild(undoBtn);
      undoBtnEl = undoBtn;
    }
  }
  if (undoBtnEl) {
    if (canUndo()) {
      undoBtnEl.style.display = 'inline-flex';
      undoBtnEl.textContent = '\u21A9 Undo';
      undoBtnEl.title = 'Undo: ' + getUndoLabel();
      undoBtnEl.onclick = function() {
        popUndo();
      };
    } else {
      undoBtnEl.style.display = 'none';
    }
  }

  if (journalState.view !== 'dashboard') {
    progressEl.style.display = 'none';
    app.innerHTML = renderCheckIn();
    bindJournalEvents();
    return;
  }

  var dashHtml = renderJournalDashboard();

  if (state.mode === 'wizard') {
    var node = TREE[state.currentNode];
    if (isResult(node)) {
      app.innerHTML = dashHtml + renderResultCard(node);
      if (!lastDiagnosis || lastDiagnosis.result.id !== node.id) saveLastDiagnosis(node);
      lastDiagnosis = { date: new Date().toISOString(), result: { id: node.id, diagnosis: node.diagnosis, severity: node.severity, confidence: node.confidence }, path: state.history.concat([node.id]) };
      renderLastDx();
      setTimeout(function() { var rc = document.getElementById('result-card'); if (rc) rc.focus(); }, 50);
    } else {
      app.innerHTML = dashHtml + renderWizardQuestion(node);
    }
    bindWizardEvents();
    bindNotesEvents();
    bindJournalEvents();
    progressEl.style.display = '';
    renderProgress();

  } else if (state.mode === 'expert') {
    app.innerHTML = dashHtml + renderExpert();
    bindExpertEvents();
    bindNotesEvents();
    bindJournalEvents();
    var expertResult = getExpertResult();
    if (expertResult && (!lastDiagnosis || lastDiagnosis.result.id !== expertResult.id)) {
      saveLastDiagnosis(expertResult);
      lastDiagnosis = { date: new Date().toISOString(), result: { id: expertResult.id, diagnosis: expertResult.diagnosis, severity: expertResult.severity, confidence: expertResult.confidence }, path: [] };
      renderLastDx();
    }
    if (expertResult) {
      setTimeout(function() { var rc = document.getElementById('result-card'); if (rc) rc.focus(); }, 50);
    }
    progressEl.style.display = 'none';

  } else if (state.mode === 'multi-dx') {
    if (multiDxState.phase === 'select') {
      app.innerHTML = dashHtml + renderMultiDxSelect();
    } else if (multiDxState.phase === 'refining') {
      app.innerHTML = renderMultiDxRefine();
    } else if (multiDxState.phase === 'results') {
      app.innerHTML = renderMultiDxResults();
    }
    bindMultiDxEvents();
    bindJournalEvents();
    progressEl.style.display = 'none';
  }
}

/* ── Transitions (Wizard) ── */
var transitioning = false;
function transitionToNode(nextId) {
  if (transitioning) return;
  transitioning = true;
  var app = document.getElementById('app');
  app.style.opacity = '0';
  app.style.transition = 'opacity 0.15s';
  setTimeout(function() {
    state.currentNode = nextId;
    render();
    app.style.opacity = '1';
    app.style.transition = 'opacity 0.3s';
    var first = app.querySelector('.opt-btn');
    if (first) first.focus();
    transitioning = false;
  }, 150);
}

/* ── Actions ── */
function selectOption(idx) {
  var node = TREE[state.currentNode];
  if (!node || !node.options || !node.options[idx]) return;

  // Save medium/lighting selections
  if (state.currentNode === 'q-medium') {
    var mediumMap = { 0: 'soil', 1: 'coco', 2: 'hydro', 3: 'soilless', 4: null };
    state.medium = (idx in mediumMap) ? mediumMap[idx] : null;
    multiDxState.medium = state.medium;
    saveGrowProfile(state.medium, state.lighting);
    if (activePlantId && typeof updatePlant === 'function') {
      updatePlant(activePlantId, { medium: state.medium });
    }
  } else if (state.currentNode === 'q-lighting') {
    var lightingMap = { 0: 'led', 1: 'hps', 2: 'cfl', 3: 'sunlight', 4: null };
    state.lighting = (idx in lightingMap) ? lightingMap[idx] : null;
    multiDxState.lighting = state.lighting;
    saveGrowProfile(state.medium, state.lighting);
    if (activePlantId && typeof updatePlant === 'function') {
      updatePlant(activePlantId, { lighting: state.lighting });
    }
  }

  state.history.push(state.currentNode);
  var nextId = node.options[idx].next;
  transitionToNode(nextId);
}

function goBack() {
  if (state.history.length === 0) return;
  var prevId = state.history.pop();
  transitionToNode(prevId);
}

function reset() {
  pushUndo('diagnosis');
  state.currentNode = ROOT;
  state.history = [];
  state.wizardNotes = {};
  transitionToNode(ROOT);
}

function setMode(mode) {
  if (mode === 'multi-dx' && !dataFileLoaded()) return;
  var prevMode = state.mode;
  pushUndo('mode: ' + state.mode);
  state.mode = mode;

  if (prevMode === 'wizard' && mode === 'expert') {
    state.expertSelections = {};
    var currentId = ROOT;
    for (var i = 0; i < state.history.length; i++) {
      var node = TREE[currentId];
      if (!node || isResult(node)) break;
      for (var j = 0; j < node.options.length; j++) {
        if (node.options[j].next === state.history[i + 1] || (i === state.history.length - 1 && node.options[j].next === state.currentNode)) {
          state.expertSelections[currentId] = j;
          currentId = node.options[j].next;
          break;
        }
      }
    }
  }

  if (mode === 'multi-dx') {
    resetMultiDxState();
  }

  updateModeSelector();
  render();
}

function updateModeSelector() {
  var buttons = document.querySelectorAll('.mode-btn');
  for (var i = 0; i < buttons.length; i++) {
    var btn = buttons[i];
    var isActive = btn.getAttribute('data-mode') === state.mode;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-checked', isActive ? 'true' : 'false');
    btn.setAttribute('tabindex', isActive ? '0' : '-1');
  }
  var subtitleEl = document.getElementById('mode-subtitle');
  if (subtitleEl) {
    var subtitles = {
      'wizard': 'Answer questions one at a time',
      'expert': 'Use dropdowns if you know your symptoms',
      'multi-dx': 'Check all symptoms that apply'
    };
    subtitleEl.textContent = subtitles[state.mode] || '';
  }
}

function expertSelect(nodeId, optionIdx, depth) {
  state.expertSelections[nodeId] = optionIdx;
  var currentId = ROOT;
  var newSelections = {};
  while (currentId) {
    var node = TREE[currentId];
    if (!node || isResult(node)) break;
    var sel = state.expertSelections[currentId];
    if (sel !== undefined && sel !== null) {
      newSelections[currentId] = sel;
      currentId = node.options[sel].next;
    } else {
      break;
    }
  }
  state.expertSelections = newSelections;

  if (currentId && TREE[currentId] && isResult(TREE[currentId])) {
    state.currentNode = currentId;
    state.history = [];
    var pathId = ROOT;
    while (pathId !== currentId) {
      var n = TREE[pathId];
      if (!n || isResult(n)) break;
      state.history.push(pathId);
      pathId = n.options[newSelections[pathId]].next;
    }
  }

  render();
}

function expertGoBack() {
  var path = [];
  var currentId = ROOT;
  while (currentId) {
    var node = TREE[currentId];
    if (!node || isResult(node)) break;
    var sel = state.expertSelections[currentId];
    if (sel !== undefined) { path.push(currentId); currentId = node.options[sel].next; }
    else break;
  }
  if (path.length > 0) {
    delete state.expertSelections[path[path.length - 1]];
  }
  render();
}

function getExpertResult() {
  var currentId = ROOT;
  while (currentId) {
    var node = TREE[currentId];
    if (!node) return null;
    if (isResult(node)) return node;
    var sel = state.expertSelections[currentId];
    if (sel !== undefined) { currentId = node.options[sel].next; }
    else { return null; }
  }
  return null;
}

/* ── Copy Diagnosis Helper ── */
function doCopyDiagnosis(node, notes) {
  var text = 'Plant Doctor Diagnosis: ' + node.diagnosis + '\n';
  text += 'Confidence: ' + Math.round(node.confidence * 100) + '%\n';
  text += 'Severity: ' + node.severity + '\n\n';
  var copyCheckFirst = resolveMediumText(node.checkFirst, state.medium);
  if (copyCheckFirst.length) {
    text += 'Check First:\n';
    for (var i = 0; i < copyCheckFirst.length; i++) text += '- ' + copyCheckFirst[i] + '\n';
    text += '\n';
  }
  // Unified action plan: personalized steps first, then generic fixes
  var copyCtx = extractNoteContext(notes);
  var copyAdvice = generateContextualAdvice(copyCtx, node.id);
  var copyFixes = resolveMediumText(node.fixes, state.medium);
  var copyHasPersonalized = copyAdvice.length > 0;
  if (copyHasPersonalized) {
    text += 'Your Action Plan:\n';
    for (var ca = 0; ca < copyAdvice.length; ca++) {
      var advText = typeof copyAdvice[ca] === 'object' ? copyAdvice[ca].text : copyAdvice[ca];
      text += '- ' + advText + '\n';
    }
    if (copyFixes.length) {
      text += '\nGeneral Tips:\n';
      for (var j = 0; j < copyFixes.length; j++) text += '- ' + copyFixes[j] + '\n';
    }
    text += '\n';
  } else if (copyFixes.length) {
    text += 'How to Fix:\n';
    for (var j = 0; j < copyFixes.length; j++) text += '- ' + copyFixes[j] + '\n';
    text += '\n';
  }
  var hasNotes = false;
  for (var k in notes) { if (notes.hasOwnProperty(k) && notes[k]) { hasNotes = true; break; } }
  if (hasNotes) {
    text += 'Notes:\n';
    for (var nk in notes) {
      if (notes.hasOwnProperty(nk) && notes[nk]) text += '- ' + notes[nk] + '\n';
    }
    text += '\n';
  }
  return text;
}

function bindCopyDiagnosisBtn(getText) {
  var copyBtn = document.getElementById('btn-copy-dx');
  if (!copyBtn) return;
  copyBtn.addEventListener('click', function() {
    var text = getText();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        copyBtn.textContent = '\u2713 Copied!';
        setTimeout(function() { copyBtn.innerHTML = '&#128203; Copy Diagnosis'; }, 2000);
      }).catch(function() {
        copyBtn.textContent = 'Copy failed';
        setTimeout(function() { copyBtn.innerHTML = '&#128203; Copy Diagnosis'; }, 2000);
      });
    } else {
      try {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copyBtn.textContent = '\u2713 Copied!';
        setTimeout(function() { copyBtn.innerHTML = '&#128203; Copy Diagnosis'; }, 2000);
      } catch(e) {
        copyBtn.textContent = 'Copy failed';
        setTimeout(function() { copyBtn.innerHTML = '&#128203; Copy Diagnosis'; }, 2000);
      }
    }
  });
}

function bindModeSelector() {
  var container = document.querySelector('.mode-selector');
  if (!container) return;

  if (!dataFileLoaded()) {
    var multiBtn = container.querySelector('[data-mode="multi-dx"]');
    if (multiBtn) {
      multiBtn.setAttribute('aria-disabled', 'true');
      multiBtn.setAttribute('title', 'Data unavailable \u2014 load plant-doctor-data.js');
    }
  }

  container.addEventListener('click', function(e) {
    var btn = e.target.closest('.mode-btn');
    if (!btn || btn.getAttribute('aria-disabled') === 'true') return;
    setMode(btn.getAttribute('data-mode'));
  });

  container.addEventListener('keydown', function(e) {
    var modes = ['wizard', 'expert'];
    if (dataFileLoaded()) modes.push('multi-dx');
    var currentIdx = modes.indexOf(state.mode);
    var newIdx = currentIdx;

    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      newIdx = (currentIdx + 1) % modes.length;
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      newIdx = (currentIdx - 1 + modes.length) % modes.length;
    } else if (e.key === 'Home') {
      e.preventDefault();
      newIdx = 0;
    } else if (e.key === 'End') {
      e.preventDefault();
      newIdx = modes.length - 1;
    } else if (e.key === 'Enter' || e.key === ' ') {
      // Allow native click to fire for button activation (mode switch via container click listener)
      return;
    } else {
      return;
    }

    setMode(modes[newIdx]);
    var newBtn = container.querySelector('[data-mode="' + modes[newIdx] + '"]');
    if (newBtn) newBtn.focus();
  });
}

/* ── Plant Data Functions ── */
function generatePlantId() {
  return 'p-' + Date.now() + '-' + Math.random().toString(36).substring(2, 6);
}

function loadPlants() {
  if (!storageAvailable) return [];
  try {
    var raw = localStorage.getItem('growdoc-plants');
    if (!raw) return [];
    var data = JSON.parse(raw);
    return Array.isArray(data) ? data : [];
  } catch(e) {
    return [];
  }
}

function savePlants(plants) {
  if (!storageAvailable) return;
  try {
    localStorage.setItem('growdoc-plants', JSON.stringify(plants));
  } catch(e) {
    var warn = document.getElementById('storage-warn');
    if (warn) {
      warn.textContent = 'Storage is full. Plant data could not be saved.';
      warn.style.display = 'block';
    }
  }
}

function addPlant(name, strain, location, startDate, medium, lighting) {
  var plant = {
    id: generatePlantId(),
    name: name || 'Unnamed Plant',
    strain: strain || '',
    location: location || '',
    startDate: startDate || '',
    medium: medium || null,
    lighting: lighting || null,
    createdAt: new Date().toISOString(),
    status: 'active'
  };
  var plants = loadPlants();
  plants.push(plant);
  savePlants(plants);
  return plant;
}

function updatePlant(plantId, updates) {
  var plants = loadPlants();
  for (var i = 0; i < plants.length; i++) {
    if (plants[i].id === plantId) {
      for (var key in updates) {
        if (updates.hasOwnProperty(key) && key !== 'id') {
          plants[i][key] = updates[key];
        }
      }
      savePlants(plants);
      return plants[i];
    }
  }
  return null;
}

function removePlant(plantId, keepJournal) {
  var plants = loadPlants();
  var filtered = [];
  for (var i = 0; i < plants.length; i++) {
    if (plants[i].id !== plantId) filtered.push(plants[i]);
  }
  savePlants(filtered);

  if (!keepJournal) {
    // Remove associated journal entries
    var newJournal = [];
    for (var j = 0; j < journalData.journal.length; j++) {
      if (journalData.journal[j].plantId !== plantId) {
        newJournal.push(journalData.journal[j]);
      }
    }
    journalData.journal = newJournal;
    saveJournalState(journalData);
  }

  // If the removed plant was the active plant, switch to next available
  if (activePlantId === plantId) {
    activePlantId = null;
    var remaining = getActivePlants();
    if (remaining.length > 0) {
      setActivePlant(remaining[0].id);
    } else {
      state.medium = null;
      state.lighting = null;
      multiDxState.medium = null;
      multiDxState.lighting = null;
      state.currentNode = ROOT;
      state.history = [];
    }
  }
}

function getPlant(plantId) {
  var plants = loadPlants();
  for (var i = 0; i < plants.length; i++) {
    if (plants[i].id === plantId) return plants[i];
  }
  return null;
}

function getActivePlants() {
  var plants = loadPlants();
  var active = [];
  for (var i = 0; i < plants.length; i++) {
    if (plants[i].status === 'active') active.push(plants[i]);
  }
  return active;
}

function getActivePlant() {
  if (!activePlantId) return null;
  return getPlant(activePlantId);
}

function setActivePlant(plantId) {
  activePlantId = plantId;
  var plant = getPlant(plantId);
  if (plant) {
    // Sync state medium/lighting from plant profile
    state.medium = plant.medium;
    state.lighting = plant.lighting;
    multiDxState.medium = plant.medium;
    multiDxState.lighting = plant.lighting;
    // Save active plant preference
    if (storageAvailable) {
      try {
        localStorage.setItem('growdoc-active-plant', plantId);
      } catch(e) {}
    }
  }
}

function loadActivePlantId() {
  if (!storageAvailable) return null;
  try {
    return localStorage.getItem('growdoc-active-plant') || null;
  } catch(e) {
    return null;
  }
}

/* ── Init ── */
function init() {
  storageAvailable = checkStorage();
  if (!storageAvailable) {
    var warn = document.getElementById('storage-warn');
    warn.textContent = 'localStorage is unavailable. Your diagnosis will not be saved.';
    warn.style.display = 'block';
  }
  journalData = loadStateV2();
  var profile = loadGrowProfile();
  state.medium = profile.medium;
  state.lighting = profile.lighting;
  multiDxState.medium = profile.medium;
  multiDxState.lighting = profile.lighting;

  // Load plants and handle migration / active plant selection
  var plants = loadPlants();

  // Migration: if no plants but grow profile exists, create default plant
  if (plants.length === 0) {
    if (profile.medium || profile.lighting) {
      var defaultPlant = addPlant('Plant 1', '', '', '', profile.medium, profile.lighting);
      activePlantId = defaultPlant.id;
      if (storageAvailable) {
        try { localStorage.setItem('growdoc-active-plant', defaultPlant.id); } catch(e) {}
      }
    }
  } else {
    // Load saved active plant
    var savedActiveId = loadActivePlantId();
    if (savedActiveId && getPlant(savedActiveId)) {
      setActivePlant(savedActiveId);
    } else if (plants.length > 0) {
      // Default to first active plant
      var activePlants = getActivePlants();
      if (activePlants.length > 0) {
        setActivePlant(activePlants[0].id);
      }
    }
  }

  // If profile exists, skip medium/lighting questions
  if (state.medium && state.lighting) {
    state.currentNode = 'q-stage';
  }
  if (journalData.lastDiagnosis) {
    lastDiagnosis = journalData.lastDiagnosis;
  } else {
    loadState();
  }
  renderLastDx();
  bindModeSelector();
  updateModeSelector();
  render();

  // Plant sidebar events
  var addPlantBtn = document.getElementById('btn-add-plant');
  if (addPlantBtn) {
    addPlantBtn.addEventListener('click', function() {
      renderAddPlantForm();
    });
  }
  var mobileToggle = document.getElementById('plant-mobile-toggle');
  if (mobileToggle) {
    mobileToggle.addEventListener('click', function() {
      var sidebar = document.getElementById('plant-sidebar');
      if (sidebar) {
        sidebar.classList.toggle('collapsed');
        var isExpanded = !sidebar.classList.contains('collapsed');
        this.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
        this.textContent = isExpanded ? 'Switch' : 'Show Plants';
      }
    });
  }
}

init();

/* ── Console Tests ── */
function runTests() {
  var passed = 0, failed = 0;
  function assert(condition, msg) {
    if (condition) { passed++; console.log('PASS:', msg); }
    else { failed++; console.error('FAIL:', msg); }
  }

  var savedState = { currentNode: state.currentNode, history: state.history.slice(), mode: state.mode, expertSelections: JSON.parse(JSON.stringify(state.expertSelections)), wizardNotes: JSON.parse(JSON.stringify(state.wizardNotes)), medium: state.medium, lighting: state.lighting, activePlantId: activePlantId };
  var savedDx = lastDiagnosis;
  var savedJournalData = JSON.parse(JSON.stringify(journalData));
  var savedJournalState = JSON.parse(JSON.stringify(journalState));
  var savedMultiDxState = JSON.parse(JSON.stringify(multiDxState));

  // Test: tree traversal reaches result node for every valid path combination
  var allPaths = 0, deadEnds = 0;
  function traverse(nodeId, depth) {
    if (depth > 20) { deadEnds++; return; }
    var node = TREE[nodeId];
    if (!node) { deadEnds++; return; }
    if (isResult(node)) { allPaths++; return; }
    if (!node.options || node.options.length === 0) { deadEnds++; return; }
    for (var i = 0; i < node.options.length; i++) {
      traverse(node.options[i].next, depth + 1);
    }
  }
  traverse(ROOT, 0);
  assert(allPaths > 0 && deadEnds === 0, 'All tree paths reach a result (' + allPaths + ' paths, ' + deadEnds + ' dead ends)');

  // Test: goBack() returns to previous question (history stack)
  // Use sync transition override to test state logic without setTimeout
  var _origTransition = transitionToNode;
  transitionToNode = function(id) { state.currentNode = id; };
  state.history = [ROOT];
  state.currentNode = 'q-symptom';
  state.mode = 'wizard';
  goBack();
  assert(state.currentNode === ROOT && state.history.length === 0, 'goBack() returns to previous question');

  // Test: reset() clears history, returns to first question
  state.history = ['q-symptom', 'q-yellow-where'];
  state.currentNode = 'q-yellow-old';
  reset();
  assert(state.currentNode === ROOT && state.history.length === 0, 'reset() clears history and returns to root');
  transitionToNode = _origTransition;

  // Test: setMode preserves wizard state when switching to expert
  state.currentNode = 'q-symptom';
  state.history = ['q-medium', 'q-lighting', 'q-stage'];
  state.mode = 'wizard';
  setMode('expert');
  assert(state.mode === 'expert', 'setMode(expert) sets mode to expert');
  var hasRootSel = state.expertSelections[ROOT] !== undefined;
  setMode('wizard');
  assert(state.mode === 'wizard', 'setMode(wizard) sets mode to wizard');
  assert(hasRootSel, 'Expert mode populated selections from wizard history');

  // Test: dependent dropdowns in expert mode disable when parent unset
  state.expertSelections = {};
  state.expertSelections[ROOT] = 1;
  var rootNode = TREE[ROOT];
  var nextNodeId = rootNode.options[1].next;
  assert(state.expertSelections[nextNodeId] === undefined, 'Dependent selection is empty when only parent is set');
  state.expertSelections[nextNodeId] = 0;
  delete state.expertSelections[ROOT];
  var cascadeCleared = (function() {
    var sel = {};
    var cid = ROOT;
    while (cid) {
      var nd = TREE[cid];
      if (!nd || isResult(nd)) break;
      var s = state.expertSelections[cid];
      if (s !== undefined) { sel[cid] = s; cid = nd.options[s].next; }
      else break;
    }
    return sel;
  })();
  assert(Object.keys(cascadeCleared).length === 0, 'Clearing parent clears dependent selections');

  // Test: all result nodes have required fields
  var resultCount = 0, missingFields = 0;
  for (var nid in TREE) {
    if (!TREE.hasOwnProperty(nid)) continue;
    var n = TREE[nid];
    if (!isResult(n)) continue;
    resultCount++;
    if (!n.diagnosis || n.confidence === undefined || !n.severity || !n.fixes || !n.checkFirst) missingFields++;
  }
  assert(resultCount >= 40, 'At least 40 result nodes: ' + resultCount);
  assert(missingFields === 0, 'All result nodes have required fields (diagnosis, confidence, severity, fixes, checkFirst): ' + missingFields + ' missing');

  // Test: confidence values 0.0-1.0
  var badConf = 0;
  for (var nid2 in TREE) {
    if (!TREE.hasOwnProperty(nid2)) continue;
    var n2 = TREE[nid2];
    if (!isResult(n2)) continue;
    if (typeof n2.confidence !== 'number' || n2.confidence < 0 || n2.confidence > 1) badConf++;
  }
  assert(badConf === 0, 'All confidence values 0.0-1.0: ' + badConf + ' out of range');

  // Test: localStorage save/load round-trips correctly
  try {
    var savedRaw = localStorage.getItem(STORAGE_KEY);
    var savedJD = JSON.parse(JSON.stringify(journalData));
    var testResult = TREE['r-n-def'];
    state.currentNode = 'r-n-def';
    state.history = [ROOT, 'q-symptom', 'q-yellow-where', 'q-yellow-old'];
    saveLastDiagnosis(testResult);
    var loaded = JSON.parse(localStorage.getItem(STORAGE_KEY));
    assert(loaded.version === 2 && loaded.lastDiagnosis && loaded.lastDiagnosis.result.diagnosis === 'Nitrogen Deficiency', 'localStorage round-trip works');
    journalData = savedJD;
    if (savedRaw) localStorage.setItem(STORAGE_KEY, savedRaw);
    else localStorage.removeItem(STORAGE_KEY);
  } catch(e) { assert(false, 'localStorage: ' + e.message); }

  // Test: corrupted localStorage triggers warning, not crash
  try {
    var savedRaw2 = localStorage.getItem(STORAGE_KEY);
    localStorage.setItem(STORAGE_KEY, '{broken json!!!');
    loadState();
    assert(true, 'Corrupted localStorage does not crash');
    if (savedRaw2) localStorage.setItem(STORAGE_KEY, savedRaw2);
    else localStorage.removeItem(STORAGE_KEY);
  } catch(e) { assert(false, 'Corrupted localStorage crashed: ' + e.message); }

  // ── Section 02: State Machine & Mode Selector Tests ──

  // Test: state.mode defaults to 'wizard'
  assert(state.mode === 'wizard', 'state.mode defaults to wizard');

  // Test: setMode('expert') updates state.mode
  var _prevMode = state.mode;
  setMode('expert');
  assert(state.mode === 'expert', 'setMode(expert) updates state.mode');
  setMode('wizard');
  assert(state.mode === 'wizard', 'setMode(wizard) restores wizard mode');
  state.mode = _prevMode;

  // Test: setMode('multi-dx') updates state.mode and initializes multiDxState
  setMode('multi-dx');
  assert(state.mode === 'multi-dx', 'setMode(multi-dx) updates state.mode');
  assert(multiDxState.phase === 'select', 'multiDxState initialized to select phase');
  assert(Array.isArray(multiDxState.selectedSymptoms), 'multiDxState.selectedSymptoms is array');
  assert(multiDxState.selectedSymptoms.length === 0, 'multiDxState.selectedSymptoms starts empty');
  setMode('wizard');

  // Test: mode selector element has role="radiogroup" with 3 role="radio" children
  var modeGroup = document.querySelector('[role="radiogroup"]');

    // Test: Fungus gnats suppressed in hydro
    assert(SCORING['r-fungus-gnats'].medium_modifier && SCORING['r-fungus-gnats'].medium_modifier['hydro'] < 0,
      'Pest scoring: fungus gnats suppressed in hydro');

    // Test: Bud rot suppressed in veg
    assert(SCORING['r-bud-rot'].stage_modifier && SCORING['r-bud-rot'].stage_modifier['veg'] < 0,
      'Pest scoring: bud rot suppressed in veg');

    // Test: silver-streaks symptom scores thrips high
    var sec06Thrips = scoreDiagnoses(['silver-streaks', 'black-frass'], null, null, null, []);
    var foundThrips = false;
    for (var s06i = 0; s06i < sec06Thrips.length; s06i++) {
      if (sec06Thrips[s06i].resultId === 'r-thrips') { foundThrips = true; break; }
    }
    assert(foundThrips, 'Pest scoring: silver-streaks + black-frass surfaces r-thrips');

    // Test: nanners-in-buds scores r-hermie-stress
    var sec06Hermie = scoreDiagnoses(['nanners-in-buds'], null, null, null, []);
    var foundHermie = false;
    for (var s06j = 0; s06j < sec06Hermie.length; s06j++) {
      if (sec06Hermie[s06j].resultId === 'r-hermie-stress') { foundHermie = true; break; }
    }
    assert(foundHermie, 'Pest scoring: nanners-in-buds surfaces r-hermie-stress');
  }

  // Test: Refine rules for new diagnoses exist
  if (typeof REFINE_RULES !== 'undefined') {
    var hasGnatsRule = false;
    var hasHermieRule = false;
    for (var rr06 = 0; rr06 < REFINE_RULES.length; rr06++) {
      if (REFINE_RULES[rr06].id === 'rule-gnats-vs-overwater') hasGnatsRule = true;
      if (REFINE_RULES[rr06].id === 'rule-hermie-stress-vs-genetic') hasHermieRule = true;
    }
    assert(hasGnatsRule, 'Pest refine: rule-gnats-vs-overwater exists');
    assert(hasHermieRule, 'Hermie refine: rule-hermie-stress-vs-genetic exists');
  }

  // Test: New symptoms are registered in SYMPTOMS
  if (typeof SYMPTOMS !== 'undefined') {
    assert(SYMPTOMS['silver-streaks'], 'Symptom registry: silver-streaks registered');
    assert(SYMPTOMS['black-frass'], 'Symptom registry: black-frass registered');
    assert(SYMPTOMS['tiny-flying-insects'], 'Symptom registry: tiny-flying-insects registered');
    assert(SYMPTOMS['glossy-new-growth'], 'Symptom registry: glossy-new-growth registered');
    assert(SYMPTOMS['gray-mold-bud'], 'Symptom registry: gray-mold-bud registered');
    assert(SYMPTOMS['single-leaf-death-bud'], 'Symptom registry: single-leaf-death-bud registered');
    assert(SYMPTOMS['pollen-sacs'], 'Symptom registry: pollen-sacs registered');
    assert(SYMPTOMS['nanners-in-buds'], 'Symptom registry: nanners-in-buds registered');
  }

  // Test: r-fungus-gnats fixes resolve correctly for hydro medium
  (function() {
    var savedMed06 = state.medium;
    state.medium = 'hydro';
    var gnatNode = TREE['r-fungus-gnats'];
    var hydroFixes = resolveMediumText(gnatNode.fixes, 'hydro');
    assert(hydroFixes.length > 0, 'Pest: fungus gnats has hydro-specific fixes');
    assert(hydroFixes[0].indexOf('unlikely in hydro') !== -1, 'Pest: hydro fix warns gnats unlikely in hydro');
    state.medium = savedMed06;
  })();

  // Test: state.medium and state.lighting initialize correctly
  assert(state.medium === savedState.medium || state.medium === null, 'state.medium initializes');
  assert(state.lighting === savedState.lighting || state.lighting === null, 'state.lighting initializes');

  // Test: loadGrowProfile returns defaults when no data
  var savedProfile = null;
  if (storageAvailable) {
    savedProfile = localStorage.getItem('growdoc-grow-profile');
    localStorage.removeItem('growdoc-grow-profile');
  }
  var emptyProfile = loadGrowProfile();
  assert(emptyProfile.medium === null, 'loadGrowProfile returns null medium when empty');
  assert(emptyProfile.lighting === null, 'loadGrowProfile returns null lighting when empty');

  // Test: saveGrowProfile and loadGrowProfile round-trip
  saveGrowProfile('coco', 'led');
  var loaded = loadGrowProfile();
  assert(loaded.medium === 'coco', 'Grow profile saves and loads medium');
  assert(loaded.lighting === 'led', 'Grow profile saves and loads lighting');

  // Test: createJournalEntry includes medium and lighting
  state.medium = 'soil';
  state.lighting = 'hps';
  var testEntryWithProfile = createJournalEntry('wizard', 'r-n-def', [{resultId: 'r-n-def', confidence: 0.85, rank: 1}], null, {});
  assert(testEntryWithProfile.medium === 'soil', 'Journal entry includes medium');
  assert(testEntryWithProfile.lighting === 'hps', 'Journal entry includes lighting');
  state.medium = savedState.medium;
  state.lighting = savedState.lighting;

  // Clean up profile test
  if (savedProfile) {
    localStorage.setItem('growdoc-grow-profile', savedProfile);
  } else if (storageAvailable) {
    localStorage.removeItem('growdoc-grow-profile');
  }

  // ── Section 02: resolveMediumText() Tests ──

  // Test: resolveMediumText handles flat array
  var flatArr = ['item1', 'item2'];
  assert(resolveMediumText(flatArr, 'soil')[0] === 'item1', 'resolveMediumText handles flat array');

  // Test: resolveMediumText handles object map with matching medium
  var objMap = { soil: ['soil-item'], coco: ['coco-item'], default: ['default-item'] };
  assert(resolveMediumText(objMap, 'soil')[0] === 'soil-item', 'resolveMediumText resolves soil');
  assert(resolveMediumText(objMap, 'coco')[0] === 'coco-item', 'resolveMediumText resolves coco');

  // Test: resolveMediumText falls back to default when medium is null
  assert(resolveMediumText(objMap, null)[0] === 'default-item', 'resolveMediumText falls back to default with null medium');

  // Test: resolveMediumText falls back to default for unknown medium
  assert(resolveMediumText(objMap, 'unknown')[0] === 'default-item', 'resolveMediumText falls back for unknown medium');

  // Test: resolveMediumText handles null/undefined input
  assert(resolveMediumText(null, 'soil').length === 0, 'resolveMediumText handles null input');
  assert(resolveMediumText(undefined, 'soil').length === 0, 'resolveMediumText handles undefined input');

  // ── Section 03: Medium/Lighting Questions & Persistent Badges ──

  // Test: ROOT is q-medium
  assert(ROOT === 'q-medium', 'ROOT is q-medium after v3 update');

  // Test: q-medium and q-lighting exist in TREE
  assert(TREE['q-medium'] && TREE['q-medium'].question, 'q-medium exists in TREE');
  assert(TREE['q-lighting'] && TREE['q-lighting'].question, 'q-lighting exists in TREE');

  // Test: q-medium options lead to q-lighting
  assert(TREE['q-medium'].options[0].next === 'q-lighting', 'q-medium options lead to q-lighting');

  // Test: q-lighting options lead to q-stage
  assert(TREE['q-lighting'].options[0].next === 'q-stage', 'q-lighting options lead to q-stage');

  // Test: renderGrowBadges returns empty when no profile
  var savedMed = state.medium;
  var savedLit = state.lighting;
  state.medium = null;
  state.lighting = null;
  assert(renderGrowBadges() === '', 'renderGrowBadges empty when no profile');
  state.medium = 'coco';
  state.lighting = 'led';
  var badgeHtml = renderGrowBadges();
  assert(badgeHtml.indexOf('Coco') !== -1, 'renderGrowBadges shows medium');
  assert(badgeHtml.indexOf('LED') !== -1, 'renderGrowBadges shows lighting');
  assert(badgeHtml.indexOf('aria-label') !== -1, 'renderGrowBadges includes aria-label');
  state.medium = savedMed;
  state.lighting = savedLit;

  // ── Section 04: Scoring Engine — Medium & Lighting Modifiers ──

  if (typeof SCORING !== 'undefined') {
    var sec04Symptoms = ['yellow-lower', 'interveinal-lower'];
    var sec04Base = scoreDiagnoses(sec04Symptoms, 'veg', null, null, []);
    var sec04Coco = scoreDiagnoses(sec04Symptoms, 'veg', 'coco', null, []);
    assert(typeof sec04Base === 'object', 'scoreDiagnoses returns object with medium param');

    // Test: coco medium suppresses overwatering
    var sec04BaseOW = null, sec04CocoOW = null;
    for (var s04i = 0; s04i < sec04Base.length; s04i++) {
      if (sec04Base[s04i].resultId === 'r-overwater') sec04BaseOW = sec04Base[s04i].score;
    }
    for (var s04j = 0; s04j < sec04Coco.length; s04j++) {
      if (sec04Coco[s04j].resultId === 'r-overwater') sec04CocoOW = sec04Coco[s04j].score;
    }
    if (sec04BaseOW !== undefined && sec04CocoOW !== undefined && sec04BaseOW !== null && sec04CocoOW !== null) {
      assert(sec04CocoOW <= sec04BaseOW, 'Coco suppresses overwatering score');
    } else {
      assert(true, 'Coco overwater suppression: r-overwater not in result set (skip)');
    }

    // Test: LED boosts Mg deficiency score
    var sec04Led = scoreDiagnoses(sec04Symptoms, 'veg', null, 'led', []);
    var sec04BaseMg = null, sec04LedMg = null;
    for (var s04k = 0; s04k < sec04Base.length; s04k++) {
      if (sec04Base[s04k].resultId === 'r-mg-def') sec04BaseMg = sec04Base[s04k].score;
    }
    for (var s04l = 0; s04l < sec04Led.length; s04l++) {
      if (sec04Led[s04l].resultId === 'r-mg-def') sec04LedMg = sec04Led[s04l].score;
    }
    if (sec04BaseMg !== null && sec04LedMg !== null) {
      assert(sec04LedMg >= sec04BaseMg, 'LED boosts Mg deficiency score');
    } else {
      assert(true, 'LED Mg boost: r-mg-def not in result set (skip)');
    }

    // Test: getAdjustedConfidence function exists
    assert(typeof getAdjustedConfidence === 'function', 'getAdjustedConfidence function exists');

    // Test: getAdjustedConfidence returns base when no modifiers
    var sec04OwNode = TREE['r-overwater'];
    if (sec04OwNode) {
      var sec04BaseConf = getAdjustedConfidence(sec04OwNode, null, null);
      var sec04CocoConf = getAdjustedConfidence(sec04OwNode, 'coco', null);
      assert(sec04BaseConf === sec04OwNode.confidence, 'getAdjustedConfidence returns base when no modifiers');
      assert(sec04CocoConf < sec04BaseConf, 'getAdjustedConfidence reduces overwater confidence for coco');
    } else {
      assert(true, 'getAdjustedConfidence: r-overwater node not found (skip)');
    }
  }

  // Test: q-yellow-old does NOT lead to r-ca-def
  var yellowOldNode = TREE['q-yellow-old'];
  if (yellowOldNode) {
    var reachesCaDef = false;
    for (var yoi = 0; yoi < yellowOldNode.options.length; yoi++) {
      if (yellowOldNode.options[yoi].next === 'r-ca-def') reachesCaDef = true;
    }
    assert(!reachesCaDef, 'Ca fix: q-yellow-old does NOT route directly to r-ca-def');
  }

  // Test: q-random-spots routes through q-spot-growth-location, not directly to r-ca-def
  var randomSpotsNode = TREE['q-random-spots'];
  if (randomSpotsNode) {
    var directCaDef = false;
    for (var rsi = 0; rsi < randomSpotsNode.options.length; rsi++) {
      if (randomSpotsNode.options[rsi].next === 'r-ca-def') directCaDef = true;
    }
    assert(!directCaDef, 'Ca fix: q-random-spots does NOT route directly to r-ca-def');
  }

  // Test: q-spot-growth-location exists and routes new growth to r-ca-def
  var spotLocNode = TREE['q-spot-growth-location'];
  assert(spotLocNode && spotLocNode.question, 'Ca fix: q-spot-growth-location exists');
  if (spotLocNode) {
    var newGrowthRoutes = false;
    for (var sli = 0; sli < spotLocNode.options.length; sli++) {
      if (spotLocNode.options[sli].next === 'r-ca-def') newGrowthRoutes = true;
    }
    assert(newGrowthRoutes, 'Ca fix: new growth spots still route to r-ca-def');
  }

  // Test: r-ca-def is reachable through new growth path
  assert(TREE['r-ca-def'], 'Ca fix: r-ca-def still exists in TREE');

  // ── Section 08: Note-Aware Diagnosis Engine Tests ──

  // Test: extractNoteContext returns structured object
  var testNotes = { 'q-stage': 'clone in coco, 3 days old, LED light' };
  if (noteContextRulesLoaded()) {
    var testCtx = extractNoteContext(testNotes);
    assert(typeof testCtx === 'object', 'NoteContext: returns object');
    assert(testCtx.rawText.length > 0, 'NoteContext: rawText populated');
    assert(typeof testCtx.keywords === 'object', 'NoteContext: keywords is array');
  } else {
    assert(true, 'NoteContext: rules not loaded, skipping extraction tests');
  }

  // Test: extractNoteContext handles empty notes
  var emptyCtx = extractNoteContext({});
  assert(emptyCtx.rawText === '', 'NoteContext: empty notes returns empty rawText');
  assert(emptyCtx.plantType === null, 'NoteContext: empty notes returns null plantType');

  // Test: extractNoteContext handles null
  var nullCtx = extractNoteContext(null);
  assert(nullCtx.plantType === null, 'NoteContext: null input returns defaults');

  // Test: generateContextualAdvice returns array
  var adviceResult = generateContextualAdvice(emptyCtx, 'r-n-def');
  assert(Array.isArray(adviceResult), 'NoteContext: generateContextualAdvice returns array');

  // Test: adjustScoresFromNotes returns scores object
  var testScores8 = { 'r-n-def': 0.5, 'r-overwater': 0.3 };
  var adjustedScores8 = adjustScoresFromNotes(testScores8, emptyCtx);
  assert(typeof adjustedScores8 === 'object', 'NoteContext: adjustScoresFromNotes returns object');
  assert(adjustedScores8['r-n-def'] >= 0, 'NoteContext: adjusted scores are non-negative');

  // ── Section 09: Multi-Plant Data Layer Tests ──

  // Test: Plant CRUD operations
  var testPlant = addPlant('Test Plant', 'OG Kush', 'Tent A', '2026-01-01', 'coco', 'led');
  assert(testPlant.id && testPlant.id.indexOf('p-') === 0, 'Multi-plant: addPlant returns plant with ID');
  assert(testPlant.name === 'Test Plant', 'Multi-plant: addPlant sets name');
  assert(testPlant.medium === 'coco', 'Multi-plant: addPlant sets medium');

  var fetched = getPlant(testPlant.id);
  assert(fetched && fetched.name === 'Test Plant', 'Multi-plant: getPlant retrieves plant');

  var updated = updatePlant(testPlant.id, { name: 'Updated Plant', strain: 'GSC' });
  assert(updated && updated.name === 'Updated Plant', 'Multi-plant: updatePlant changes name');
  assert(updated.strain === 'GSC', 'Multi-plant: updatePlant sets strain');

  // Test: setActivePlant syncs state
  setActivePlant(testPlant.id);
  assert(activePlantId === testPlant.id, 'Multi-plant: setActivePlant sets activePlantId');
  assert(state.medium === 'coco', 'Multi-plant: setActivePlant syncs medium to state');
  assert(state.lighting === 'led', 'Multi-plant: setActivePlant syncs lighting to state');

  // Test: createJournalEntry includes plantId
  var testEntry = createJournalEntry('wizard', 'r-n-def', [{resultId: 'r-n-def', confidence: 0.85, rank: 1}], null, {});
  assert(testEntry.plantId === testPlant.id, 'Multi-plant: journal entry includes plantId');

  // Cleanup
  removePlant(testPlant.id, true);
  var afterRemove = getPlant(testPlant.id);
  assert(afterRemove === null, 'Multi-plant: removePlant deletes plant');
  activePlantId = null;
  state.medium = savedState.medium;
  state.lighting = savedState.lighting;

  // Test: Undo stack operations
  undoStack = [];
  pushUndo('test-action');
  assert(undoStack.length === 1, 'Undo: pushUndo adds to stack');
  assert(canUndo() === true, 'Undo: canUndo returns true when stack has entries');
  assert(getUndoLabel() === 'test-action', 'Undo: getUndoLabel returns correct label');

  // Test: popUndo restores state
  var preUndoNode = state.currentNode;
  state.currentNode = 'r-n-def';
  pushUndo('before-change');
  state.currentNode = 'r-ca-def';
  popUndo();
  assert(state.currentNode === 'r-n-def', 'Undo: popUndo restores currentNode');

  // Test: Undo stack max size
  undoStack = [];
  for (var ui = 0; ui < 10; ui++) pushUndo('item-' + ui);
  assert(undoStack.length === UNDO_MAX, 'Undo: stack respects max size');

  // Test: canUndo returns false when empty
  undoStack = [];
  assert(canUndo() === false, 'Undo: canUndo returns false when empty');
  assert(popUndo() === false, 'Undo: popUndo returns false when empty');

  // Cleanup
  undoStack = [];
  state.currentNode = savedState.currentNode;

  // Restore state
  state.currentNode = savedState.currentNode;
  state.history = savedState.history;
  state.mode = savedState.mode;
  state.expertSelections = savedState.expertSelections;
  state.wizardNotes = savedState.wizardNotes;
  state.medium = savedState.medium;
  state.lighting = savedState.lighting;
  activePlantId = savedState.activePlantId;
  lastDiagnosis = savedDx;
  undoStack = [];
  journalData = savedJournalData;
  journalState.view = savedJournalState.view;
  journalState.activeEntryId = savedJournalState.activeEntryId;
  journalState.checkInData = savedJournalState.checkInData;
  multiDxState.stage = savedMultiDxState.stage;
  multiDxState.selectedSymptoms = savedMultiDxState.selectedSymptoms;
  multiDxState.notes = savedMultiDxState.notes;
  multiDxState.refineStep = savedMultiDxState.refineStep;
  multiDxState.refineQuestions = savedMultiDxState.refineQuestions;
  multiDxState.refineAnswers = savedMultiDxState.refineAnswers;
  multiDxState.scores = savedMultiDxState.scores;
  multiDxState.results = savedMultiDxState.results;
  multiDxState.phase = savedMultiDxState.phase;
  multiDxState.medium = savedMultiDxState.medium;
  multiDxState.lighting = savedMultiDxState.lighting;
  render();

  console.log('\n' + passed + ' passed, ' + failed + ' failed');
}
</script>
