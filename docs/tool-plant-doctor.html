<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Doctor — GrowDoc</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Serif+4:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e0a; --bg2: #141a10; --bg3: #1a2214;
  --text: #d4cdb7; --text2: #a39e8a; --text3: #6b6756;
  --accent: #8fb856; --accent2: #6a9e3a; --accent3: #4a7a25;
  --gold: #c9a84c; --gold2: #a8872e;
  --red: #c45c4a; --red2: #a33d2d;
  --blue: #5a9eb8;
  --border: #2a3320; --border2: #3a4530;
  --serif: 'DM Serif Display', Georgia, serif;
  --body: 'Source Serif 4', Georgia, serif;
  --mono: 'IBM Plex Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 24px;
  max-width: 860px;
  margin: 0 auto;
}

.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* Header */
.header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
h1 { font-family: var(--serif); font-size: 1.8rem; color: var(--accent); margin-bottom: 4px; }
.subtitle { font-size: 0.9rem; color: var(--text2); margin-bottom: 0; }

/* Mode selector (segmented control) */
.mode-selector {
  display: flex; gap: 0; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 8px; padding: 3px; flex-shrink: 0;
}
.mode-btn {
  font-family: var(--mono); font-size: 0.78rem; font-weight: 600; padding: 8px 16px;
  border: none; border-radius: 6px; background: transparent; color: var(--text2);
  cursor: pointer; min-height: 36px; transition: background 0.15s, color 0.15s; white-space: nowrap;
}
.mode-btn:hover { background: rgba(143,184,86,0.08); color: var(--text); }
.mode-btn.active { background: var(--accent3); color: var(--text); }
.mode-btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
.mode-btn[aria-disabled="true"] { opacity: 0.35; cursor: not-allowed; }
.mode-btn[aria-disabled="true"]:hover { background: transparent; color: var(--text2); }

/* Storage warning */
.storage-warn {
  background: rgba(201,168,76,0.15); border: 1px solid var(--gold2); border-radius: 8px;
  padding: 10px 14px; font-size: 0.82rem; margin-bottom: 16px; display: none; color: var(--gold);
}

/* Last diagnosis banner */
.last-dx {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px; margin-bottom: 20px; display: none;
}
.last-dx-header { font-family: var(--mono); font-size: 0.72rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.last-dx-name { font-family: var(--serif); font-size: 1.05rem; color: var(--accent); }
.last-dx-date { font-family: var(--mono); font-size: 0.72rem; color: var(--text3); margin-top: 2px; }

/* Progress dots */
.progress { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.dot {
  width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border2);
  transition: background 0.3s, border-color 0.3s;
}
.dot.done { background: var(--accent); border-color: var(--accent); }
@keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 0 rgba(143,184,86,0.5); } 50% { box-shadow: 0 0 0 6px rgba(143,184,86,0); } }
.dot.active { border-color: var(--accent); animation: pulse-dot 1.5s infinite; }
.dot-sep { width: 16px; height: 2px; background: var(--border2); border-radius: 1px; }
.dot-sep.done { background: var(--accent3); }

/* Question card */
.q-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; margin-bottom: 20px;
}
.q-text { font-family: var(--serif); font-size: 1.2rem; color: var(--text); margin-bottom: 6px; }
.q-help { font-size: 0.82rem; color: var(--text3); font-style: italic; margin-bottom: 16px; }

/* Option buttons */
.options { display: flex; flex-direction: column; gap: 8px; }
.opt-btn {
  display: block; width: 100%; text-align: left; padding: 14px 18px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-family: var(--body);
  font-size: 0.95rem; cursor: pointer; min-height: 44px; transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
}
.opt-btn:hover { border-color: var(--accent3); background: rgba(143,184,86,0.08); }
.opt-btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
.opt-btn:active { transform: scale(0.99); }

/* Back / Start Over buttons */
.nav-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  padding: 12px 24px; border-radius: 8px; font-family: var(--mono); font-size: 0.85rem; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border2); min-height: 44px; transition: background 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.97); }
.btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
.btn-secondary { background: var(--bg3); color: var(--text2); }
.btn-secondary:hover { background: var(--border); }
.btn-primary { background: var(--accent3); color: var(--text); border-color: var(--accent2); }
.btn-primary:hover { background: var(--accent2); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Result card */
.result-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; margin-bottom: 20px; border-left: 4px solid var(--accent);
}
.result-card.sev-critical { border-left-color: var(--red); }
.result-card.sev-warning { border-left-color: var(--gold); }
.result-card.sev-note { border-left-color: var(--accent); }
.result-dx { font-family: var(--serif); font-size: 1.4rem; color: var(--text); margin-bottom: 8px; }
.result-sev {
  display: inline-block; font-family: var(--mono); font-size: 0.72rem; font-weight: 600;
  padding: 3px 10px; border-radius: 4px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;
}
.result-sev.sev-critical { background: rgba(196,92,74,0.2); color: var(--red); }
.result-sev.sev-warning { background: rgba(201,168,76,0.2); color: var(--gold); }
.result-sev.sev-note { background: rgba(143,184,86,0.2); color: var(--accent); }

/* Confidence bar */
.conf-wrap { margin-bottom: 16px; }
.conf-label { font-family: var(--mono); font-size: 0.78rem; color: var(--text2); margin-bottom: 4px; }
.conf-bar { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.conf-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.5s ease-out; }
.conf-pct { font-family: var(--mono); font-size: 0.82rem; color: var(--accent); font-weight: 600; margin-top: 4px; }

/* Check first / fixes / also consider */
.result-section { margin-bottom: 14px; }
.result-section-title {
  font-family: var(--mono); font-size: 0.72rem; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.result-ol { padding-left: 20px; }
.result-ol li { font-size: 0.9rem; color: var(--text2); margin-bottom: 4px; line-height: 1.5; }
.result-ol li strong { color: var(--text); font-weight: 600; }
.also-list { list-style: none; padding: 0; }
.also-item { font-size: 0.85rem; color: var(--text3); padding: 4px 0; }
.also-name { color: var(--text2); font-weight: 600; }
.also-hint { font-style: italic; }

/* Expert mode */
.expert-group { margin-bottom: 16px; }
.expert-label {
  display: block; font-family: var(--mono); font-size: 0.78rem; font-weight: 600;
  color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.expert-select {
  width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text); font-family: var(--body); font-size: 0.95rem;
  min-height: 44px; cursor: pointer; transition: border-color 0.2s;
}
.expert-select:focus { outline: 3px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
.expert-select:disabled { opacity: 0.4; cursor: not-allowed; }
.expert-help { font-size: 0.78rem; color: var(--text3); font-style: italic; margin-top: 4px; }

/* Fade animation */
@keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fade-in 0.3s ease-out; }

/* Notes expander */
.notes-expander {
  margin-top: 12px;
  margin-bottom: 8px;
}
.notes-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--text3);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  transition: color 0.15s;
}
.notes-toggle:hover {
  color: var(--text2);
}
.notes-toggle:focus-visible {
  outline: 3px solid var(--accent);
  outline-offset: 2px;
}
.notes-toggle-icon {
  display: inline-block;
  width: 14px;
  height: 14px;
  transition: transform 0.2s;
}
.notes-toggle-icon.open {
  transform: rotate(90deg);
}
.notes-body {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.25s ease-out, opacity 0.2s ease-out;
}
.notes-body.open {
  max-height: 120px;
  opacity: 1;
}
.notes-textarea {
  width: 100%;
  min-height: 60px;
  max-height: 80px;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--body);
  font-size: 0.85rem;
  resize: vertical;
  transition: border-color 0.2s;
}
.notes-textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.notes-textarea::placeholder {
  color: var(--text3);
  font-style: italic;
}
.notes-counter {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text3);
  text-align: right;
  margin-top: 4px;
}
.notes-counter.near-limit {
  color: var(--gold);
}
.notes-counter.at-limit {
  color: var(--red);
}
/* Notes display in result card */
.result-notes {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.result-notes-title {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.result-note-item {
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 4px;
  padding-left: 8px;
  border-left: 2px solid var(--border2);
}
.result-note-step {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text3);
}

/* Multi-Dx: Growth stage selector */
.stage-selector {
  margin-bottom: 20px;
}
.stage-selector label {
  display: block;
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.stage-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.stage-pill {
  font-family: var(--body);
  font-size: 0.85rem;
  padding: 8px 14px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  min-height: 36px;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
}
.stage-pill:hover {
  border-color: var(--accent3);
  color: var(--text);
}
.stage-pill.selected {
  background: var(--accent3);
  border-color: var(--accent2);
  color: var(--text);
}
.stage-pill:focus-visible {
  outline: 3px solid var(--accent);
  outline-offset: 2px;
}
/* Multi-Dx: Symptom checkboxes */
.symptom-groups {
  margin-bottom: 20px;
}
.symptom-group {
  margin-bottom: 16px;
}
.symptom-group fieldset {
  border: none;
  padding: 0;
  margin: 0;
}
.symptom-group legend {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  padding: 0;
}
.symptom-check {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border: 1px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  min-height: 40px;
  transition: background 0.15s, border-color 0.15s;
  margin-bottom: 4px;
}
.symptom-check:hover {
  background: rgba(143, 184, 86, 0.06);
}
.symptom-check.checked {
  background: rgba(143, 184, 86, 0.1);
  border-color: var(--accent3);
}
.symptom-check input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}
.symptom-check-label {
  font-size: 0.9rem;
  color: var(--text);
  cursor: pointer;
}
/* Multi-Dx: Hints and warnings */
.dx-hint {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text3);
  font-style: italic;
  margin-bottom: 12px;
  padding: 8px 12px;
  background: rgba(143, 184, 86, 0.06);
  border-radius: 6px;
}
.dx-warning {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--gold);
  padding: 8px 12px;
  background: rgba(201, 168, 76, 0.1);
  border: 1px solid rgba(201, 168, 76, 0.2);
  border-radius: 6px;
  margin-bottom: 12px;
}
/* Multi-Dx: Results */
.dx-results-header {
  font-family: var(--serif);
  font-size: 1.3rem;
  color: var(--text);
  margin-bottom: 16px;
}
.dx-rank {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text3);
  margin-bottom: 4px;
}
.dx-supported-by {
  font-size: 0.82rem;
  color: var(--text3);
  margin-top: 8px;
  font-style: italic;
}
.combined-plan {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  margin-top: 24px;
}
.combined-plan-title {
  font-family: var(--serif);
  font-size: 1.15rem;
  color: var(--accent);
  margin-bottom: 16px;
}

/* Journal Dashboard */
.journal-dashboard {
  margin-bottom: 24px;
}
.journal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.journal-title {
  font-family: var(--serif);
  font-size: 1.1rem;
  color: var(--accent);
}
.journal-entry {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 10px;
}
.journal-entry-date {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text3);
}
.journal-entry-dx {
  font-family: var(--serif);
  font-size: 1rem;
  color: var(--text);
  margin: 4px 0;
}
.journal-entry-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.journal-status {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.journal-status.status-active {
  background: rgba(90, 158, 184, 0.15);
  color: var(--blue);
}
.journal-status.status-treating {
  background: rgba(201, 168, 76, 0.15);
  color: var(--gold);
}
.journal-status.status-resolved {
  background: rgba(143, 184, 86, 0.15);
  color: var(--accent);
}
.journal-status.status-escalated {
  background: rgba(196, 92, 74, 0.15);
  color: var(--red);
}
.journal-days {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text3);
}

/* Check-in flow */
.checkin-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
}
.checkin-title {
  font-family: var(--serif);
  font-size: 1.2rem;
  color: var(--text);
  margin-bottom: 12px;
}
.checkin-context {
  font-size: 0.85rem;
  color: var(--text3);
  margin-bottom: 16px;
}

/* Score changelog */
.score-change {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 0.82rem;
  padding: 6px 0;
}
.score-change-up { color: var(--accent); }
.score-change-down { color: var(--red); }
.score-change-same { color: var(--text3); }

/* Treatment selection checkboxes */
.treatment-select {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.treatment-select:hover {
  background: rgba(143, 184, 86, 0.06);
}
.treatment-select.checked {
  border-color: var(--accent3);
  background: rgba(143, 184, 86, 0.08);
}
.treatment-select input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  margin-top: 2px;
  flex-shrink: 0;
}

/* Responsive */
@media (max-width: 640px) {
  body { padding: 14px; }
  h1 { font-size: 1.4rem; }
  .header { flex-direction: column; }
  .q-text { font-size: 1.05rem; }
  .result-dx { font-size: 1.2rem; }
  .opt-btn { padding: 12px 14px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Plant Doctor</h1>
    <p class="subtitle">Interactive symptom diagnosis wizard</p>
  </div>
  <div class="mode-selector" role="radiogroup" aria-label="Diagnosis mode">
    <button class="mode-btn active" role="radio" aria-checked="true" data-mode="wizard" tabindex="0" type="button">Wizard</button>
    <button class="mode-btn" role="radio" aria-checked="false" data-mode="expert" tabindex="-1" type="button">Expert</button>
    <button class="mode-btn" role="radio" aria-checked="false" data-mode="multi-dx" tabindex="-1" type="button">Multi-Dx</button>
  </div>
</div>

<div class="storage-warn" id="storage-warn"></div>
<div class="last-dx" id="last-dx"></div>
<div class="progress" id="progress" role="img" aria-label="Diagnosis progress"></div>
<div id="app" aria-live="polite"></div>

<script src="plant-doctor-data.js"></script>
<script>
/* ── Helpers ── */
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function makeResult(o) {
  var r = {
    checkFirst: ['Verify pH: 6.0\u20136.5 (soil) or 5.5\u20136.0 (coco/hydro)'],
    fixes: [],
    alsoConsider: []
  };
  for (var k in o) { if (o.hasOwnProperty(k)) r[k] = o[k]; }
  return r;
}

/* ── Decision Tree ── */
var ROOT = 'q-stage';
var TREE = {
  /* ── Level 1: Growth Stage ── */
  'q-stage': { id:'q-stage', question:'What growth stage is the plant in?', help:'This helps narrow down the most likely causes.', options:[
    { label:'Seedling / clone', next:'q-seedling-symptom' },
    { label:'Vegetative', next:'q-symptom' },
    { label:'Early flower (weeks 1\u20133)', next:'q-symptom' },
    { label:'Mid flower (weeks 4\u20136)', next:'q-symptom' },
    { label:'Late flower (week 7+)', next:'q-symptom-late' }
  ]},

  /* ── Seedling-specific ── */
  'q-seedling-symptom': { id:'q-seedling-symptom', question:'What is the seedling showing?', help:'Seedlings and fresh clones have unique issues.', options:[
    { label:'Stretching \u2014 tall and leggy', next:'r-stretching' },
    { label:'Stem narrowing at soil line', next:'r-damping-off' },
    { label:'Drooping or wilting', next:'r-seedling-overwater' },
    { label:'Yellowing leaves', next:'q-seedling-yellow' },
    { label:'Other symptoms', next:'q-symptom' }
  ]},
  'q-seedling-yellow': { id:'q-seedling-yellow', question:'What part is yellowing?', options:[
    { label:'Cotyledons (round first leaves)', next:'r-cotyledon-normal' },
    { label:'First true leaves', next:'r-seedling-nute' },
    { label:'Whole seedling is pale', next:'r-light-distance' }
  ]},

/* ── Scoring Engine ── */
function scoreDiagnoses(selectedSymptoms, stage, treatedDiagnoses) {
  if (!selectedSymptoms || !Array.isArray(selectedSymptoms)) return [];
  var results = [];
  var selectedMap = {};
  for (var i = 0; i < selectedSymptoms.length; i++) {
    selectedMap[selectedSymptoms[i]] = true;
  }

  for (var diagId in SCORING) {
    if (!SCORING.hasOwnProperty(diagId)) continue;
    var entry = SCORING[diagId];
    var matched = [];
    var matchedWeight = 0;
    var totalWeight = 0;

    for (var symId in entry.symptoms) {
      if (!entry.symptoms.hasOwnProperty(symId)) continue;
      totalWeight += entry.symptoms[symId];
      if (selectedMap[symId]) {
        matchedWeight += entry.symptoms[symId];
        matched.push(symId);
      }
    }

    if (totalWeight === 0 || matched.length === 0) continue;

    var baseScore = matchedWeight / totalWeight;

    // Stage modifier
    var stageAdjust = 0;
    if (entry.stage_modifier && entry.stage_modifier[stage] !== undefined) {
      stageAdjust = entry.stage_modifier[stage];
    }

    // Corroboration bonus
    var regionsHit = {};
    for (var mi = 0; mi < matched.length; mi++) {
      var sym = SYMPTOMS[matched[mi]];
      if (sym) regionsHit[sym.region] = true;
    }
    var regionCount = 0;
    for (var rk in regionsHit) {
      if (regionsHit.hasOwnProperty(rk)) regionCount++;
    }
    var corroboration = regionCount > 1 ? (regionCount - 1) * 0.05 : 0;

    // Final score
    var finalScore = baseScore + stageAdjust + corroboration;
    finalScore = Math.min(finalScore, entry.base_confidence);
    finalScore = Math.max(0, Math.min(1, finalScore));

    // Treated penalty
    if (treatedDiagnoses && Array.isArray(treatedDiagnoses)) {
      for (var ti = 0; ti < treatedDiagnoses.length; ti++) {
        if (treatedDiagnoses[ti] === diagId) {
          finalScore = Math.max(0, finalScore - 0.2);
        }
      }
    }

    if (finalScore >= 0.25) {
      results.push({ resultId: diagId, score: finalScore, matchedSymptoms: matched });
    }
  }

  results.sort(function(a, b) { return b.score - a.score; });
  return results.slice(0, 5);
}

function getRefineQuestions(rankedDiagnoses) {
  var matched = [];
  for (var i = 0; i < REFINE_RULES.length; i++) {
    var rule = REFINE_RULES[i];
    try {
      if (rule.condition(rankedDiagnoses)) {
        matched.push(rule);
      }
    } catch (e) {
      // Skip rules with broken conditions
    }
  }
  return matched;
}

function applyRefineAnswer(scores, ruleId, optionIndex) {
  // Find the rule
  var rule = null;
  for (var i = 0; i < REFINE_RULES.length; i++) {
    if (REFINE_RULES[i].id === ruleId) { rule = REFINE_RULES[i]; break; }
  }
  if (!rule || !rule.options[optionIndex]) return scores.slice();

  var adjust = rule.options[optionIndex].adjust;

  // Deep copy scores
  var updated = [];
  for (var j = 0; j < scores.length; j++) {
    updated.push({
      resultId: scores[j].resultId,
      score: scores[j].score,
      matchedSymptoms: scores[j].matchedSymptoms.slice()
    });
  }

  // Apply adjustments
  for (var k = 0; k < updated.length; k++) {
    if (adjust[updated[k].resultId] !== undefined) {
      updated[k].score += adjust[updated[k].resultId];
      updated[k].score = Math.max(0, Math.min(1, updated[k].score));
    }
  }

  // Re-sort
  updated.sort(function(a, b) { return b.score - a.score; });
  return updated;
}

function generateCombinedPlan(topDiagnoses) {
  var checkFirstSet = {};
  var checkFirstList = [];
  var fixEntries = [];
  var alsoSet = {};
  var alsoList = [];

  for (var i = 0; i < topDiagnoses.length; i++) {
    var diag = topDiagnoses[i];
    var treeNode = TREE[diag.resultId];
    if (!treeNode || !isResult(treeNode)) continue;

    // checkFirst — deduplicate
    if (treeNode.checkFirst) {
      for (var ci = 0; ci < treeNode.checkFirst.length; ci++) {
        var cf = treeNode.checkFirst[ci];
        if (!checkFirstSet[cf]) {
          checkFirstSet[cf] = true;
          checkFirstList.push(cf);
        }
      }
    }

    // fixes — track count and rank
    if (treeNode.fixes) {
      for (var fi = 0; fi < treeNode.fixes.length; fi++) {
        fixEntries.push({ fix: treeNode.fixes[fi], rank: i, diagId: diag.resultId });
      }
    }

    // alsoConsider — deduplicate by name
    if (treeNode.alsoConsider) {
      for (var ai = 0; ai < treeNode.alsoConsider.length; ai++) {
        var ac = treeNode.alsoConsider[ai];
        if (!alsoSet[ac.name]) {
          alsoSet[ac.name] = true;
          alsoList.push(ac);
        }
      }
    }
  }

  // Deduplicate and order fixes
  var fixCount = {};
  var fixFirstRank = {};
  for (var fe = 0; fe < fixEntries.length; fe++) {
    var f = fixEntries[fe].fix;
    if (fixCount[f] === undefined) {
      fixCount[f] = 0;
      fixFirstRank[f] = fixEntries[fe].rank;
    }
    fixCount[f]++;
    if (fixEntries[fe].rank < fixFirstRank[f]) {
      fixFirstRank[f] = fixEntries[fe].rank;
    }
  }

  var uniqueFixes = [];
  var fixSeen = {};
  for (var uf = 0; uf < fixEntries.length; uf++) {
    if (!fixSeen[fixEntries[uf].fix]) {
      fixSeen[fixEntries[uf].fix] = true;
      uniqueFixes.push(fixEntries[uf].fix);
    }
  }

  uniqueFixes.sort(function(a, b) {
    if (fixCount[b] !== fixCount[a]) return fixCount[b] - fixCount[a];
    return fixFirstRank[a] - fixFirstRank[b];
  });

  return {
    checkFirst: checkFirstList,
    fixes: uniqueFixes,
    alsoConsider: alsoList
  };
}

/* ── Multi-Dx Helpers ── */
function toggleSymptom(symptomId) {
  var idx = multiDxState.selectedSymptoms.indexOf(symptomId);
  if (idx === -1) {
    multiDxState.selectedSymptoms.push(symptomId);
  } else {
    multiDxState.selectedSymptoms.splice(idx, 1);
  }
}

function canDiagnose() {
  return multiDxState.stage !== null && multiDxState.selectedSymptoms.length >= 2;
}

function runMultiDxDiagnosis() {
  var scores = scoreDiagnoses(multiDxState.selectedSymptoms, multiDxState.stage, []);
  multiDxState.results = scores;
  var refineQs = getRefineQuestions(scores);
  multiDxState.refineQuestions = refineQs;
  multiDxState.refineStep = 0;
  multiDxState.refineAnswers = [];
  if (refineQs.length > 0) {
    multiDxState.phase = 'refining';
  } else {
    multiDxState.phase = 'results';
  }
}

function answerRefineQuestion(optionIndex) {
  var currentRule = multiDxState.refineQuestions[multiDxState.refineStep];
  if (!currentRule) return;
  multiDxState.refineAnswers.push({ ruleId: currentRule.id, optionIndex: optionIndex });
  multiDxState.results = applyRefineAnswer(multiDxState.results, currentRule.id, optionIndex);
  multiDxState.refineStep++;
  if (multiDxState.refineStep >= multiDxState.refineQuestions.length) {
    multiDxState.phase = 'results';
  }
}

function multiDxGoBack() {
  if (multiDxState.phase === 'results') {
    if (multiDxState.refineQuestions.length > 0) {
      multiDxState.phase = 'refining';
      multiDxState.refineStep = multiDxState.refineQuestions.length - 1;
      multiDxState.refineAnswers.pop();
      var scores = scoreDiagnoses(multiDxState.selectedSymptoms, multiDxState.stage, []);
      for (var i = 0; i < multiDxState.refineAnswers.length; i++) {
        var ans = multiDxState.refineAnswers[i];
        scores = applyRefineAnswer(scores, ans.ruleId, ans.optionIndex);
      }
      multiDxState.results = scores;
    } else {
      multiDxState.phase = 'select';
    }
  } else if (multiDxState.phase === 'refining') {
    if (multiDxState.refineStep > 0) {
      multiDxState.refineStep--;
      multiDxState.refineAnswers.pop();
      var scores2 = scoreDiagnoses(multiDxState.selectedSymptoms, multiDxState.stage, []);
      for (var j = 0; j < multiDxState.refineAnswers.length; j++) {
        var ans2 = multiDxState.refineAnswers[j];
        scores2 = applyRefineAnswer(scores2, ans2.ruleId, ans2.optionIndex);
      }
      multiDxState.results = scores2;
    } else {
      multiDxState.phase = 'select';
    }
  }
}

/* ── Storage ── */
function checkStorage() {
  try {
    localStorage.setItem('__test', '1');
    localStorage.removeItem('__test');
    return true;
  } catch (e) { return false; }
}

function saveLastDiagnosis(resultNode) {
  if (!storageAvailable) return;
  var data = {
    version: 1,
    lastDiagnosis: {
      date: new Date().toISOString(),
      path: state.history.concat([state.currentNode]),
      result: { id: resultNode.id, diagnosis: resultNode.diagnosis, severity: resultNode.severity, confidence: resultNode.confidence }
    }
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) { /* quota */ }
}

function loadState() {
  if (!storageAvailable) return;
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data && data.version === 1 && data.lastDiagnosis) {
      lastDiagnosis = data.lastDiagnosis;
    }
  } catch (e) {
    var warn = document.getElementById('storage-warn');
    warn.textContent = 'Saved data was corrupted and has been reset.';
    warn.style.display = 'block';
    try { localStorage.removeItem(STORAGE_KEY); } catch (e2) { /* ignore */ }
  }
}

/* ── Journal Data Functions ── */
var journalData = { version: 2, journal: [], migrateCount: 0 };

function generateId() {
  return 'j-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8);
}

function createJournalEntry(mode, primaryResultId, diagnoses, combinedPlan, notes) {
  return {
    id: generateId(),
    createdAt: new Date().toISOString(),
    stage: mode === 'multi-dx' ? multiDxState.stage : null,
    mode: mode,
    symptoms: mode === 'multi-dx' ? multiDxState.selectedSymptoms.slice() : [],
    notes: notes ? JSON.parse(JSON.stringify(notes)) : {},
    diagnoses: diagnoses ? diagnoses.map(function(d) {
      return { resultId: d.resultId, confidence: d.score || d.confidence, rank: d.rank || 0 };
    }) : [],
    combinedPlan: combinedPlan ? JSON.parse(JSON.stringify(combinedPlan)) : null,
    treatments: [],
    checkIns: [],
    status: 'active'
  };
}

function evictJournalEntry(journal) {
  if (journal.length < 20) return journal;

  var oldestResolvedIdx = -1;
  var oldestResolvedDate = null;
  for (var i = 0; i < journal.length; i++) {
    if (journal[i].status === 'resolved') {
      var d = new Date(journal[i].createdAt);
      if (oldestResolvedIdx === -1 || d < oldestResolvedDate) {
        oldestResolvedIdx = i;
        oldestResolvedDate = d;
      }
    }
  }

  if (oldestResolvedIdx !== -1) {
    journal.splice(oldestResolvedIdx, 1);
    return journal;
  }

  var oldestIdx = 0;
  var oldestDate = new Date(journal[0].createdAt);
  for (var j = 1; j < journal.length; j++) {
    var dj = new Date(journal[j].createdAt);
    if (dj < oldestDate) {
      oldestIdx = j;
      oldestDate = dj;
    }
  }
  journal.splice(oldestIdx, 1);
  return journal;
}

function createTreatments(actions) {
  var treatments = [];
  for (var i = 0; i < actions.length; i++) {
    treatments.push({
      action: actions[i],
      startedAt: new Date().toISOString(),
      status: 'active'
    });
  }
  return treatments;
}

function createCheckInRecord(response, symptomsResolved, symptomsNew, notes) {
  return {
    date: new Date().toISOString(),
    response: response,
    symptomsResolved: symptomsResolved || [],
    symptomsNew: symptomsNew || [],
    notes: notes || '',
    updatedScores: null
  };
}

function getJournalEntry(id) {
  for (var i = 0; i < journalData.journal.length; i++) {
    if (journalData.journal[i].id === id) return journalData.journal[i];
  }
  return null;
}

/* ── localStorage v2 Schema and Migration ── */
function loadStateV2() {
  if (!storageAvailable) return { version: 2, journal: [], migrateCount: 0 };
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { version: 2, journal: [], migrateCount: 0 };
    var data = JSON.parse(raw);

    if (data.version === 2) {
      if (!Array.isArray(data.journal)) {
        data.journal = [];
        var warn = document.getElementById('storage-warn');
        if (warn) {
          warn.textContent = 'Journal data was corrupted and has been reset.';
          warn.style.display = 'block';
        }
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) { /* quota */ }
      }
      if (typeof data.migrateCount === 'number') {
        data.migrateCount++;
        if (data.migrateCount >= 5) {
          localStorage.removeItem(STORAGE_KEY + '-v1-backup');
        }
      }
      return data;
    }

    if (data.version === 1) {
      localStorage.setItem(STORAGE_KEY + '-v1-backup', raw);

      var journal = [];
      if (data.lastDiagnosis) {
        var ld = data.lastDiagnosis;
        journal.push({
          id: generateId(),
          createdAt: ld.date || new Date().toISOString(),
          stage: null,
          mode: 'wizard',
          symptoms: [],
          notes: {},
          diagnoses: [{ resultId: ld.result.id, confidence: ld.result.confidence, rank: 1 }],
          combinedPlan: null,
          treatments: [],
          checkIns: [],
          status: 'resolved'
        });
      }

      var v2Data = {
        version: 2,
        journal: journal,
        migrateCount: 0,
        lastDiagnosis: data.lastDiagnosis
      };

      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(v2Data)); } catch(e) { /* quota */ }
      return v2Data;
    }

    return { version: 2, journal: [], migrateCount: 0 };
  } catch(e) {
    var warn2 = document.getElementById('storage-warn');
    if (warn2) {
      warn2.textContent = 'Saved data was corrupted and has been reset.';
      warn2.style.display = 'block';
    }
    try { localStorage.removeItem(STORAGE_KEY); } catch(e2) { /* ignore */ }
    return { version: 2, journal: [], migrateCount: 0 };
  }
}

function saveJournalState(jData) {
  if (!storageAvailable) return;
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(jData));
  } catch(e) { /* quota */ }
}

function saveToJournal() {
  var entry;
  if (state.mode === 'multi-dx') {
    var plan = generateCombinedPlan(multiDxState.results);
    entry = createJournalEntry('multi-dx', null, multiDxState.results, plan, multiDxState.notes);
    entry.stage = multiDxState.stage;
    entry.symptoms = multiDxState.selectedSymptoms.slice();
  } else {
    var node = TREE[state.currentNode];
    if (!node || !isResult(node)) return;
    entry = createJournalEntry(
      state.mode,
      node.id,
      [{ resultId: node.id, score: node.confidence, rank: 1 }],
      null,
      state.wizardNotes
    );
  }

  if (journalData.journal.length >= 20) {
    journalData.journal = evictJournalEntry(journalData.journal);
  }

  journalData.journal.push(entry);
  saveJournalState(journalData);

  journalState.view = 'treatment-select';
  journalState.activeEntryId = entry.id;
  render();
}

/* ── Node Helpers ── */
function isResult(node) {
  return node && typeof node.diagnosis === 'string';
}

/* ── Rendering: Progress Dots ── */
function renderProgress() {
  var el = document.getElementById('progress');
  var node = TREE[state.currentNode];
  var steps = state.history.length;
  var atResult = isResult(node);
  var total = steps + (atResult ? 0 : 1);
  var maxPossible = 5;
  var html = '';
  for (var i = 0; i < Math.min(total, maxPossible); i++) {
    if (i > 0) html += '<div class="dot-sep' + (i <= steps ? ' done' : '') + '"></div>';
    if (i < steps) {
      html += '<div class="dot done"></div>';
    } else if (i === steps && !atResult) {
      html += '<div class="dot active"></div>';
    } else {
      html += '<div class="dot"></div>';
    }
  }
  if (atResult && steps > 0) {
    html = '';
    for (var j = 0; j < Math.min(steps, maxPossible); j++) {
      if (j > 0) html += '<div class="dot-sep done"></div>';
      html += '<div class="dot done"></div>';
    }
  }
  el.innerHTML = html;
  el.setAttribute('aria-label', 'Step ' + (steps + 1) + ' of diagnosis');
}

/* ── Rendering: Wizard Question ── */
function renderWizardQuestion(node) {
  var html = '<div class="q-card fade-in">';
  html += '<div class="q-text">' + escapeHtml(node.question) + '</div>';
  if (node.help) html += '<div class="q-help">' + escapeHtml(node.help) + '</div>';
  html += '<div class="options" role="group" aria-label="Answer options">';
  for (var i = 0; i < node.options.length; i++) {
    html += '<button class="opt-btn" data-idx="' + i + '" type="button">' + escapeHtml(node.options[i].label) + '</button>';
  }
  html += '</div>';
  // Notes expander
  var existingNote = state.wizardNotes[node.id] || '';
  html += renderNotesExpander(node.id, existingNote, 'wizardNotes');
  html += '</div>';
  if (state.history.length > 0) {
    html += '<div class="nav-row"><button class="btn btn-secondary" id="btn-back" type="button">Back</button>';
    html += '<button class="btn btn-secondary" id="btn-reset" type="button">Start Over</button></div>';
  }
  return html;
}

/* ── Rendering: Result Card ── */
function renderResultCard(node) {
  var sevClass = 'sev-' + node.severity;
  var pct = Math.round(node.confidence * 100);
  var html = '<div class="result-card ' + sevClass + ' fade-in" tabindex="-1" id="result-card">';
  html += '<span class="sr-only">Diagnosis result: ' + escapeHtml(node.diagnosis) + ', severity ' + escapeHtml(node.severity) + ', confidence ' + pct + ' percent</span>';
  html += '<div class="result-dx">' + escapeHtml(node.diagnosis) + '</div>';
  html += '<span class="result-sev ' + sevClass + '">' + escapeHtml(node.severity) + '</span>';
  html += '<div class="conf-wrap"><div class="conf-label">Confidence</div>';
  html += '<div class="conf-bar"><div class="conf-fill" style="width:' + pct + '%"></div></div>';
  html += '<div class="conf-pct">' + pct + '%</div></div>';

  if (node.checkFirst && node.checkFirst.length > 0) {
    html += '<div class="result-section"><div class="result-section-title">Check First</div><ol class="result-ol">';
    for (var c = 0; c < node.checkFirst.length; c++) html += '<li>' + escapeHtml(node.checkFirst[c]) + '</li>';
    html += '</ol></div>';
  }
  if (node.fixes && node.fixes.length > 0) {
    html += '<div class="result-section"><div class="result-section-title">How to Fix</div><ol class="result-ol">';
    for (var f = 0; f < node.fixes.length; f++) html += '<li>' + escapeHtml(node.fixes[f]) + '</li>';
    html += '</ol></div>';
  }
  if (node.alsoConsider && node.alsoConsider.length > 0) {
    html += '<div class="result-section"><div class="result-section-title">Also Consider</div><ul class="also-list">';
    for (var a = 0; a < node.alsoConsider.length; a++) {
      html += '<li class="also-item"><span class="also-name">' + escapeHtml(node.alsoConsider[a].name) + '</span>';
      if (node.alsoConsider[a].hint) html += ' &mdash; <span class="also-hint">' + escapeHtml(node.alsoConsider[a].hint) + '</span>';
      html += '</li>';
    }
    html += '</ul></div>';
  }

  // Notes display
  var notesToShow = {};
  if (state.mode === 'multi-dx') {
    notesToShow = multiDxState.notes;
  } else {
    notesToShow = state.wizardNotes;
  }
  var hasNotes = false;
  for (var nk in notesToShow) {
    if (notesToShow.hasOwnProperty(nk) && notesToShow[nk]) { hasNotes = true; break; }
  }
  if (hasNotes) {
    html += '<div class="result-notes">';
    html += '<div class="result-notes-title">Your Notes</div>';
    for (var noteKey in notesToShow) {
      if (!notesToShow.hasOwnProperty(noteKey) || !notesToShow[noteKey]) continue;
      html += '<div class="result-note-item">';
      html += '<span class="result-note-step">' + escapeHtml(noteKey) + '</span><br>';
      html += escapeHtml(notesToShow[noteKey]);
      html += '</div>';
    }
    html += '</div>';
  }

  html += '</div>';
  html += '<div class="nav-row">';
  html += '<button class="btn btn-primary" id="btn-save-track" type="button">Save &amp; Start Tracking</button>';
  html += '<button class="btn btn-secondary" id="btn-reset" type="button">Start Over</button>';
  if (state.history.length > 0) {
    html += '<button class="btn btn-secondary" id="btn-back" type="button">Back</button>';
  }
  html += '</div>';
  return html;
}

/* ── Rendering: Expert Mode ── */
function renderExpert() {
  var html = '';
  var currentId = ROOT;
  var depth = 0;
  var reachedResult = false;

  while (currentId) {
    var node = TREE[currentId];
    if (!node) break;
    if (isResult(node)) {
      html += renderResultCard(node);
      reachedResult = true;
      break;
    }
    html += '<div class="expert-group fade-in">';
    html += '<label class="expert-label" for="expert-sel-' + depth + '">' + escapeHtml(node.question) + '</label>';
    html += '<select class="expert-select" id="expert-sel-' + depth + '" data-node="' + node.id + '" data-depth="' + depth + '">';
    html += '<option value="">Select...</option>';
    var sel = state.expertSelections[node.id];
    for (var i = 0; i < node.options.length; i++) {
      var selected = (sel === i) ? ' selected' : '';
      html += '<option value="' + i + '"' + selected + '>' + escapeHtml(node.options[i].label) + '</option>';
    }
    html += '</select>';
    if (node.help) html += '<div class="expert-help">' + escapeHtml(node.help) + '</div>';
    // Notes expander for expert mode
    var expertNote = state.wizardNotes[node.id] || '';
    html += renderNotesExpander(node.id, expertNote, 'wizardNotes');
    html += '</div>';

    if (sel !== undefined && sel !== null) {
      currentId = node.options[sel].next;
      depth++;
    } else {
      currentId = null;
    }
  }

  if (!reachedResult) {
    html += '<div class="nav-row" style="margin-top:8px"><button class="btn btn-secondary" id="btn-expert-reset" type="button">Reset All</button></div>';
  }
  return html;
}

/* ── Rendering: Multi-Dx Select ── */
function renderMultiDxSelect() {
  var html = '<div class="fade-in">';
  // Growth stage selector
  html += '<div class="stage-selector">';
  html += '<label>Growth Stage</label>';
  html += '<div class="stage-pills">';
  var stages = [
    { id: 'seedling', label: 'Seedling / Clone' },
    { id: 'veg', label: 'Vegetative' },
    { id: 'early-flower', label: 'Early Flower (wk 1-3)' },
    { id: 'mid-flower', label: 'Mid Flower (wk 4-6)' },
    { id: 'late-flower', label: 'Late Flower (wk 7+)' }
  ];
  for (var si = 0; si < stages.length; si++) {
    var selected = multiDxState.stage === stages[si].id ? ' selected' : '';
    html += '<button class="stage-pill' + selected + '" type="button"'
         + ' data-stage="' + stages[si].id + '">'
         + escapeHtml(stages[si].label) + '</button>';
  }
  html += '</div></div>';
  // Symptom checkboxes grouped by region
  var regions = [
    { id: 'leaves', label: 'Leaves' },
    { id: 'stems', label: 'Stems & Structure' },
    { id: 'roots', label: 'Roots' },
    { id: 'whole', label: 'Whole Plant' }
  ];
  html += '<div class="symptom-groups">';
  for (var ri = 0; ri < regions.length; ri++) {
    var regionSymptoms = [];
    for (var symId in SYMPTOMS) {
      if (!SYMPTOMS.hasOwnProperty(symId)) continue;
      if (SYMPTOMS[symId].region === regions[ri].id) {
        regionSymptoms.push(SYMPTOMS[symId]);
      }
    }
    if (regionSymptoms.length === 0) continue;
    regionSymptoms.sort(function(a, b) {
      return a.label < b.label ? -1 : a.label > b.label ? 1 : 0;
    });
    html += '<div class="symptom-group"><fieldset>';
    html += '<legend>' + escapeHtml(regions[ri].label) + '</legend>';
    for (var syi = 0; syi < regionSymptoms.length; syi++) {
      var sym = regionSymptoms[syi];
      var isChecked = multiDxState.selectedSymptoms.indexOf(sym.id) !== -1;
      html += '<label class="symptom-check' + (isChecked ? ' checked' : '') + '">';
      html += '<input type="checkbox" value="' + escapeHtml(sym.id) + '"'
           + (isChecked ? ' checked' : '') + '>';
      html += '<span class="symptom-check-label">' + escapeHtml(sym.label) + '</span>';
      html += '</label>';
    }
    html += '</fieldset></div>';
  }
  html += '</div>';
  // Hints and warnings
  var symCount = multiDxState.selectedSymptoms.length;
  if (symCount === 1) {
    html += '<div class="dx-hint">Select at least 2 symptoms, or use Wizard mode for single-issue diagnosis.</div>';
  }
  if (symCount > 8) {
    html += '<div class="dx-warning">Many symptoms selected — results may be less precise. Consider focusing on the most prominent 4-6.</div>';
  }
  // Notes expander
  var existingNote = multiDxState.notes['step-symptoms'] || '';
  html += renderNotesExpander('step-symptoms', existingNote, 'multiDxNotes');
  // Diagnose button
  var disabled = canDiagnose() ? '' : ' disabled';
  html += '<div class="nav-row" style="margin-top: 16px;">';
  html += '<button class="btn btn-primary" id="btn-diagnose" type="button"' + disabled + '>Diagnose (' + symCount + ' symptoms)</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

/* ── Rendering: Multi-Dx Results ── */
function renderMultiDxResults() {
  var results = multiDxState.results;
  if (!results || results.length === 0) return '<p>No diagnoses matched your symptoms.</p>';
  var html = '<div class="fade-in">';
  html += '<div class="dx-results-header">Combined Diagnosis</div>';
  for (var i = 0; i < results.length; i++) {
    var diag = results[i];
    var treeNode = TREE[diag.resultId];
    if (!treeNode || !isResult(treeNode)) continue;
    var pct = Math.round(diag.score * 100);
    var sevClass = 'sev-' + treeNode.severity;
    html += '<div class="result-card ' + sevClass + '">';
    html += '<div class="dx-rank">#' + (i + 1) + '</div>';
    html += '<div class="result-dx">' + escapeHtml(treeNode.diagnosis) + '</div>';
    html += '<span class="result-sev ' + sevClass + '">' + escapeHtml(treeNode.severity) + '</span>';
    html += '<div class="conf-wrap"><div class="conf-label">Confidence</div>';
    html += '<div class="conf-bar"><div class="conf-fill" style="width:' + pct + '%"></div></div>';
    html += '<div class="conf-pct">' + pct + '%</div></div>';
    if (diag.matchedSymptoms && diag.matchedSymptoms.length > 0) {
      var symLabels = [];
      for (var mi = 0; mi < diag.matchedSymptoms.length; mi++) {
        var sym = SYMPTOMS[diag.matchedSymptoms[mi]];
        if (sym) symLabels.push(sym.label.toLowerCase());
      }
      html += '<div class="dx-supported-by">Supported by: ' + escapeHtml(symLabels.join(', ')) + '</div>';
    }
    html += '</div>';
  }
  // Combined Action Plan
  var plan = generateCombinedPlan(results);
  html += '<div class="combined-plan">';
  html += '<div class="combined-plan-title">Combined Action Plan</div>';
  if (plan.checkFirst.length > 0) {
    html += '<div class="result-section"><div class="result-section-title">Check First</div><ol class="result-ol">';
    for (var ci = 0; ci < plan.checkFirst.length; ci++) {
      html += '<li>' + escapeHtml(plan.checkFirst[ci]) + '</li>';
    }
    html += '</ol></div>';
  }
  if (plan.fixes.length > 0) {
    html += '<div class="result-section"><div class="result-section-title">Fix Steps</div><ol class="result-ol">';
    for (var fi = 0; fi < plan.fixes.length; fi++) {
      html += '<li>' + escapeHtml(plan.fixes[fi]) + '</li>';
    }
    html += '</ol></div>';
  }
  if (plan.alsoConsider.length > 0) {
    html += '<div class="result-section"><div class="result-section-title">Also Consider</div><ul class="also-list">';
    for (var ai = 0; ai < plan.alsoConsider.length; ai++) {
      html += '<li class="also-item"><span class="also-name">' + escapeHtml(plan.alsoConsider[ai].name) + '</span>';
      if (plan.alsoConsider[ai].hint) html += ' &mdash; <span class="also-hint">' + escapeHtml(plan.alsoConsider[ai].hint) + '</span>';
      html += '</li>';
    }
    html += '</ul></div>';
  }
  html += '</div>';
  // Notes display
  var hasNotes = false;
  for (var nk in multiDxState.notes) {
    if (multiDxState.notes.hasOwnProperty(nk) && multiDxState.notes[nk]) { hasNotes = true; break; }
  }
  if (hasNotes) {
    html += '<div class="result-notes">';
    html += '<div class="result-notes-title">Your Notes</div>';
    for (var noteKey in multiDxState.notes) {
      if (!multiDxState.notes.hasOwnProperty(noteKey) || !multiDxState.notes[noteKey]) continue;
      html += '<div class="result-note-item">' + escapeHtml(multiDxState.notes[noteKey]) + '</div>';
    }
    html += '</div>';
  }
  // Action buttons
  html += '<div class="nav-row" style="margin-top: 20px;">';
  html += '<button class="btn btn-primary" id="btn-save-track" type="button">Save &amp; Start Tracking</button>';
  html += '<button class="btn btn-secondary" id="btn-mdx-back" type="button">Back</button>';
  html += '<button class="btn btn-secondary" id="btn-mdx-reset" type="button">Start Over</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

/* ── Multi-Dx Event Binding ── */
function bindMultiDxEvents() {
  var pills = document.querySelectorAll('.stage-pill');
  for (var i = 0; i < pills.length; i++) {
    pills[i].addEventListener('click', function() {
      multiDxState.stage = this.getAttribute('data-stage');
      render();
    });
  }
  var checks = document.querySelectorAll('.symptom-check input[type="checkbox"]');
  for (var j = 0; j < checks.length; j++) {
    checks[j].addEventListener('change', function() {
      toggleSymptom(this.value);
      render();
    });
  }
  var diagnoseBtn = document.getElementById('btn-diagnose');
  if (diagnoseBtn) {
    diagnoseBtn.addEventListener('click', function() {
      if (canDiagnose()) {
        runMultiDxDiagnosis();
        render();
      }
    });
  }
  var refineOpts = document.querySelectorAll('[data-refine-idx]');
  for (var k = 0; k < refineOpts.length; k++) {
    refineOpts[k].addEventListener('click', function() {
      var idx = parseInt(this.getAttribute('data-refine-idx'), 10);
      answerRefineQuestion(idx);
      render();
    });
  }
  var backBtn = document.getElementById('btn-mdx-back');
  if (backBtn) {
    backBtn.addEventListener('click', function() {
      multiDxGoBack();
      render();
    });
  }
  var resetBtn = document.getElementById('btn-mdx-reset');
  if (resetBtn) {
    resetBtn.addEventListener('click', function() {
      resetMultiDxState();
      render();
    });
  }
  var saveBtn = document.getElementById('btn-save-track');
  if (saveBtn) {
    saveBtn.addEventListener('click', function() {
      if (typeof saveToJournal === 'function') {
        saveToJournal();
      }
    });
  }
  bindNotesEvents();
}

/* ── Rendering: Last Diagnosis Banner ── */
function renderLastDx() {
  var el = document.getElementById('last-dx');
  if (!lastDiagnosis) { el.style.display = 'none'; return; }
  var d = new Date(lastDiagnosis.date);
  var dateStr = d.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
  el.innerHTML = '<div class="last-dx-header">Last Diagnosis</div>'
    + '<div class="last-dx-name">' + escapeHtml(lastDiagnosis.result.diagnosis) + '</div>'
    + '<div class="last-dx-date">' + escapeHtml(dateStr) + '</div>';
  el.style.display = 'block';
}

/* ── Rendering: Journal Dashboard ── */
function isAtStartingState() {
  if (state.mode === 'wizard') return state.currentNode === ROOT && state.history.length === 0;
  if (state.mode === 'expert') return Object.keys(state.expertSelections).length === 0;
  if (state.mode === 'multi-dx') return multiDxState.phase === 'select' && multiDxState.selectedSymptoms.length === 0;
  return false;
}

function renderJournalDashboard() {
  if (!journalData || !journalData.journal || journalData.journal.length === 0) return '';
  if (!isAtStartingState()) return '';

  var html = '<div class="journal-dashboard">';
  html += '<div class="journal-header">';
  html += '<div class="journal-title">Treatment Journal</div>';
  html += '</div>';

  var active = [];
  var resolved = [];
  for (var i = 0; i < journalData.journal.length; i++) {
    var e = journalData.journal[i];
    if (e.status === 'resolved') resolved.push(e);
    else active.push(e);
  }

  active.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
  resolved.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });

  var entries = active.concat(resolved.slice(0, 3));

  for (var j = 0; j < entries.length; j++) {
    var entry = entries[j];
    var d = new Date(entry.createdAt);
    var dateStr = d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    var daysAgo = Math.floor((Date.now() - d.getTime()) / 86400000);

    var dxName = 'Unknown';
    if (entry.diagnoses && entry.diagnoses.length > 0) {
      var treeNode = TREE[entry.diagnoses[0].resultId];
      if (treeNode) dxName = treeNode.diagnosis;
      if (entry.diagnoses.length > 1) {
        var secondary = TREE[entry.diagnoses[1].resultId];
        if (secondary) dxName += ' + ' + secondary.diagnosis;
      }
    }

    html += '<article class="journal-entry">';
    html += '<div class="journal-entry-date">' + escapeHtml(dateStr) + '</div>';
    html += '<div class="journal-entry-dx">' + escapeHtml(dxName) + '</div>';
    html += '<div class="journal-entry-meta">';
    html += '<span class="journal-status status-' + escapeHtml(entry.status) + '">' + escapeHtml(entry.status) + '</span>';
    html += '<span class="journal-days">' + daysAgo + ' day' + (daysAgo !== 1 ? 's' : '') + ' ago</span>';
    html += '</div>';

    if (entry.status === 'active' || entry.status === 'treating') {
      html += '<div style="margin-top: 8px;">';
      html += '<button class="btn btn-secondary" data-checkin-id="' + escapeHtml(entry.id) + '" type="button">Check In</button>';
      html += '</div>';
    }

    html += '</article>';
  }

  html += '</div>';
  return html;
}

/* ── Rendering: Treatment Selection ── */
function renderTreatmentSelect() {
  var entry = getJournalEntry(journalState.activeEntryId);
  if (!entry) return '<p>Entry not found.</p>';

  var fixes = [];
  if (entry.combinedPlan && entry.combinedPlan.fixes) {
    fixes = entry.combinedPlan.fixes;
  } else if (entry.diagnoses && entry.diagnoses.length > 0) {
    var treeNode = TREE[entry.diagnoses[0].resultId];
    if (treeNode && treeNode.fixes) fixes = treeNode.fixes;
  }

  var html = '<div class="checkin-card fade-in">';
  html += '<div class="checkin-title">Select Treatments to Track</div>';
  html += '<div class="checkin-context">Check the fix steps you plan to apply. These will be tracked in your journal.</div>';

  for (var i = 0; i < fixes.length; i++) {
    html += '<label class="treatment-select">';
    html += '<input type="checkbox" value="' + i + '" data-fix="' + escapeHtml(fixes[i]) + '">';
    html += '<span>' + escapeHtml(fixes[i]) + '</span>';
    html += '</label>';
  }

  html += '<div class="nav-row" style="margin-top: 16px;">';
  html += '<button class="btn btn-primary" id="btn-start-tracking" type="button">Start Tracking</button>';
  html += '<button class="btn btn-secondary" id="btn-skip-tracking" type="button">Skip</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

function renderCheckInStep2() {
  var entry = getJournalEntry(journalState.activeEntryId);
  var response = journalState.checkInData.response;
  if (!entry || !response) return '';

  var html = '<div class="checkin-card fade-in">';

  if (response === 'much-better' || response === 'somewhat-better') {
    html += '<div class="q-text">Which symptoms have improved or resolved?</div>';

    for (var i = 0; i < symptoms.length; i++) {

      html += '<label class="symptom-check">';
      html += '<input type="checkbox" value="' + escapeHtml(symptoms[i]) + '" class="resolved-symptom">';
      html += '<span class="symptom-check-label">' + escapeHtml(label) + '</span>';
      html += '</label>';
    }
  } else if (response === 'no-change' || response === 'getting-worse') {

    html += '<input type="number" class="expert-select" id="days-since-fix" min="0" max="90" value="3" style="width: 120px;">';
    html += renderNotesExpander('checkin-detail', '', 'wizardNotes');
  } else if (response === 'new-symptoms') {
    html += '<div class="q-text">Which new symptoms appeared?</div>';

      var existing = {};
      for (var k = 0; k < (entry.symptoms || []).length; k++) existing[entry.symptoms[k]] = true;
      for (var symId in SYMPTOMS) {
        if (!SYMPTOMS.hasOwnProperty(symId) || existing[symId]) continue;
        html += '<label class="symptom-check">';
        html += '<input type="checkbox" value="' + escapeHtml(symId) + '" class="new-symptom">';

function renderCheckInResult() {
  var entry = getJournalEntry(journalState.activeEntryId);
  if (!entry) return '';
  var checkInData = journalState.checkInData;

  var html = '<div class="checkin-card fade-in">';
  html += '<div class="checkin-title">Updated Assessment</div>';

  if (checkInData.updatedScores && checkInData.previousScores) {
    for (var i = 0; i < checkInData.updatedScores.length; i++) {
      var updated = checkInData.updatedScores[i];
      var treeNode = TREE[updated.resultId];
      var name = treeNode ? treeNode.diagnosis : updated.resultId;
      var oldScore = null;
      for (var j = 0; j < checkInData.previousScores.length; j++) {
        if (checkInData.previousScores[j].resultId === updated.resultId) {
          oldScore = checkInData.previousScores[j].confidence || checkInData.previousScores[j].score;
          break;
        }
      }

      var oldPct = oldScore !== null ? Math.round(oldScore * 100) : '?';
      var newPct = Math.round(updated.score * 100);
      var changeClass = updated.score > (oldScore || 0) ? 'score-change-up' : updated.score < (oldScore || 0) ? 'score-change-down' : 'score-change-same';
      var arrow = updated.score > (oldScore || 0) ? '&#9650;' : updated.score < (oldScore || 0) ? '&#9660;' : '&#8212;';

      html += '<div class="score-change ' + changeClass + '">';
      html += '<span>' + escapeHtml(name) + ': ' + oldPct + '% &#8594; ' + newPct + '% ' + arrow + '</span>';
      html += '</div>';
    }
  }

  html += '</div>';
  html += '<div class="nav-row">';
  html += '<button class="btn btn-primary" id="btn-checkin-done" type="button">Done</button>';
  html += '</div>';
  return html;
}

function renderCheckIn() {
  if (journalState.view === 'treatment-select') return renderTreatmentSelect();
  if (journalState.view === 'check-in') return renderCheckInStep1();
  if (journalState.view === 'check-in-detail') return renderCheckInStep2();
  if (journalState.view === 'check-in-result') return renderCheckInResult();
  return '';
}

/* ── Check-In Processing ── */
function processCheckIn() {
  var entry = getJournalEntry(journalState.activeEntryId);
  if (!entry) return;

  var response = journalState.checkInData.response;
  var resolvedSymptoms = [];
  var newSymptoms = [];

  var resolvedChecks = document.querySelectorAll('.resolved-symptom:checked');
  for (var i = 0; i < resolvedChecks.length; i++) {
    resolvedSymptoms.push(resolvedChecks[i].value);
  }

  var newChecks = document.querySelectorAll('.new-symptom:checked');
  for (var j = 0; j < newChecks.length; j++) {
    newSymptoms.push(newChecks[j].value);
  }

  journalState.checkInData.previousScores = entry.diagnoses.slice();

  var originalSymptomCount = entry.symptoms ? entry.symptoms.length : 0;

  if (dataFileLoaded() && entry.symptoms && entry.symptoms.length > 0) {
    var updatedSymptoms = [];
    for (var k = 0; k < entry.symptoms.length; k++) {
      if (resolvedSymptoms.indexOf(entry.symptoms[k]) === -1) {
        updatedSymptoms.push(entry.symptoms[k]);
      }
    }
    for (var l = 0; l < newSymptoms.length; l++) {
      updatedSymptoms.push(newSymptoms[l]);
    }

    var treatedIds = entry.diagnoses.map(function(d) { return d.resultId; });
    var newScores = scoreDiagnoses(updatedSymptoms, entry.stage || 'veg', treatedIds);
    journalState.checkInData.updatedScores = newScores;

    entry.symptoms = updatedSymptoms;
    entry.diagnoses = newScores.map(function(s, idx) {
      return { resultId: s.resultId, confidence: s.score, rank: idx + 1 };
    });
  }

  var notes = '';
  var notesInput = document.querySelector('.notes-textarea');
  if (notesInput) notes = notesInput.value.substring(0, 200);

  var daysSinceFix = null;
  var daysInput = document.getElementById('days-since-fix');
  if (daysInput) daysSinceFix = parseInt(daysInput.value, 10) || null;

  var record = createCheckInRecord(response, resolvedSymptoms, newSymptoms, notes);
  record.updatedScores = journalState.checkInData.updatedScores || null;
  if (daysSinceFix !== null) record.daysSinceFix = daysSinceFix;
  entry.checkIns.push(record);

  if (response === 'much-better' && resolvedSymptoms.length >= originalSymptomCount && originalSymptomCount > 0) {
    entry.status = 'resolved';
  }

  saveJournalState(journalData);
  journalState.view = 'check-in-result';
  render();
}

/* ── Journal Event Binding ── */
function bindJournalEvents() {
  var checkInBtns = document.querySelectorAll('[data-checkin-id]');
  for (var i = 0; i < checkInBtns.length; i++) {
    checkInBtns[i].addEventListener('click', function() {
      journalState.activeEntryId = this.getAttribute('data-checkin-id');
      journalState.view = 'check-in';
      journalState.checkInData = {};
      render();
    });
  }

  var responseBtns = document.querySelectorAll('[data-checkin-response]');
  for (var j = 0; j < responseBtns.length; j++) {
    responseBtns[j].addEventListener('click', function() {
      journalState.checkInData.response = this.getAttribute('data-checkin-response');
      journalState.view = 'check-in-detail';
      render();
    });
  }

  var cancelBtn = document.getElementById('btn-checkin-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', function() {
    journalState.view = 'dashboard';
    journalState.activeEntryId = null;
    render();
  });

  var backBtn = document.getElementById('btn-checkin-back');
  if (backBtn) backBtn.addEventListener('click', function() {
    journalState.view = 'check-in';
    render();
  });

  var submitBtn = document.getElementById('btn-checkin-submit');
  if (submitBtn) submitBtn.addEventListener('click', function() {
    processCheckIn();
  });

  var doneBtn = document.getElementById('btn-checkin-done');
  if (doneBtn) doneBtn.addEventListener('click', function() {
    journalState.view = 'dashboard';
    journalState.activeEntryId = null;
    render();
  });

  var treatmentChecks = document.querySelectorAll('.treatment-select input[type="checkbox"]');
  for (var tc = 0; tc < treatmentChecks.length; tc++) {
    treatmentChecks[tc].addEventListener('change', function() {
      this.closest('.treatment-select').classList.toggle('checked', this.checked);
    });
  }

  var startTrackBtn = document.getElementById('btn-start-tracking');
  if (startTrackBtn) startTrackBtn.addEventListener('click', function() {
    var checked = document.querySelectorAll('.treatment-select input:checked');
    var actions = [];
    for (var k = 0; k < checked.length; k++) {
      actions.push(checked[k].getAttribute('data-fix'));
    }
    var entry = getJournalEntry(journalState.activeEntryId);
    if (entry && actions.length > 0) {
      entry.treatments = createTreatments(actions);
      entry.status = 'treating';
      saveJournalState(journalData);
    }
    journalState.view = 'dashboard';
    render();
  });

  var skipBtn = document.getElementById('btn-skip-tracking');
  if (skipBtn) skipBtn.addEventListener('click', function() {
    journalState.view = 'dashboard';
    render();
  });

  if (typeof bindNotesEvents === 'function') bindNotesEvents();
}

/* ── Rendering: Notes Expander ── */
function renderNotesExpander(stepId, existingContent, storageKey) {
  var content = existingContent || '';
  var isOpen = content.length > 0;
  var charCount = content.length;

  var html = '<div class="notes-expander">';
  html += '<button class="notes-toggle" type="button" data-notes-step="' + escapeHtml(stepId) + '"'
       + ' data-notes-store="' + escapeHtml(storageKey) + '"'
       + ' aria-expanded="' + (isOpen ? 'true' : 'false') + '">';
  html += '<span class="notes-toggle-icon' + (isOpen ? ' open' : '') + '">&#9654;</span>';
  html += isOpen ? 'Notes' : 'Add notes';
  html += '</button>';
  html += '<div class="notes-body' + (isOpen ? ' open' : '') + '">';
  html += '<textarea class="notes-textarea" data-notes-step="' + escapeHtml(stepId) + '"'
       + ' data-notes-store="' + escapeHtml(storageKey) + '"'
       + ' maxlength="200"'
       + ' placeholder="Optional: add context about this step..."'
       + ' aria-label="Notes for this step">'
       + escapeHtml(content) + '</textarea>';

  var counterClass = 'notes-counter';
  if (charCount >= 200) counterClass += ' at-limit';
  else if (charCount >= 170) counterClass += ' near-limit';
  html += '<div class="' + counterClass + '">' + charCount + '/200</div>';
  html += '</div></div>';
  return html;
}

function bindNotesEvents() {
  // Toggle buttons
  var toggles = document.querySelectorAll('.notes-toggle');
  for (var i = 0; i < toggles.length; i++) {
    toggles[i].addEventListener('click', function() {
      var body = this.nextElementSibling;
      var icon = this.querySelector('.notes-toggle-icon');
      var isOpen = body.classList.contains('open');

      body.classList.toggle('open');
      icon.classList.toggle('open');
      this.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
      this.textContent = '';
      var newIcon = document.createElement('span');
      newIcon.className = 'notes-toggle-icon' + (!isOpen ? ' open' : '');
      newIcon.innerHTML = '&#9654;';
      this.appendChild(newIcon);
      this.appendChild(document.createTextNode(!isOpen ? 'Notes' : 'Add notes'));

      if (!isOpen) {
        var textarea = body.querySelector('.notes-textarea');
        if (textarea) textarea.focus();
      }
    });
  }

  // Textarea input handlers
  var textareas = document.querySelectorAll('.notes-textarea');
  for (var j = 0; j < textareas.length; j++) {
    textareas[j].addEventListener('input', function() {
      var stepId = this.getAttribute('data-notes-step');
      var store = this.getAttribute('data-notes-store');
      var value = this.value.substring(0, 200);
      this.value = value;

      var counter = this.parentElement.querySelector('.notes-counter');
      if (counter) {
        counter.textContent = value.length + '/200';
        counter.className = 'notes-counter';
        if (value.length >= 200) counter.className += ' at-limit';
        else if (value.length >= 170) counter.className += ' near-limit';
      }

      if (store === 'wizardNotes') {
        state.wizardNotes[stepId] = value;
      } else if (store === 'multiDxNotes') {
        multiDxState.notes[stepId] = value;
      }
    });
  }
}

/* ── Main Render ── */
function render() {
  var app = document.getElementById('app');
  var progressEl = document.getElementById('progress');

  if (journalState.view !== 'dashboard') {
    progressEl.style.display = 'none';
    app.innerHTML = renderCheckIn();
    bindJournalEvents();
    return;
  }

  var dashHtml = renderJournalDashboard();

  if (state.mode === 'wizard') {
    var node = TREE[state.currentNode];
    if (isResult(node)) {
      app.innerHTML = dashHtml + renderResultCard(node);
      saveLastDiagnosis(node);
      lastDiagnosis = { date: new Date().toISOString(), result: { id: node.id, diagnosis: node.diagnosis, severity: node.severity, confidence: node.confidence }, path: state.history.concat([node.id]) };
      renderLastDx();
      setTimeout(function() { var rc = document.getElementById('result-card'); if (rc) rc.focus(); }, 50);
    } else {
      app.innerHTML = dashHtml + renderWizardQuestion(node);
    }
    bindWizardEvents();
    bindNotesEvents();
    bindJournalEvents();
    progressEl.style.display = '';
    renderProgress();

  } else if (state.mode === 'expert') {
    app.innerHTML = dashHtml + renderExpert();
    bindExpertEvents();
    bindNotesEvents();
    bindJournalEvents();
    var expertResult = getExpertResult();
    if (expertResult && (!lastDiagnosis || lastDiagnosis.result.id !== expertResult.id)) {
      saveLastDiagnosis(expertResult);
      lastDiagnosis = { date: new Date().toISOString(), result: { id: expertResult.id, diagnosis: expertResult.diagnosis, severity: expertResult.severity, confidence: expertResult.confidence }, path: [] };
      renderLastDx();
    }
    if (expertResult) {
      setTimeout(function() { var rc = document.getElementById('result-card'); if (rc) rc.focus(); }, 50);
    }
    progressEl.style.display = 'none';

  } else if (state.mode === 'multi-dx') {
    if (multiDxState.phase === 'select') {
      app.innerHTML = dashHtml + renderMultiDxSelect();
    } else if (multiDxState.phase === 'refining') {
      app.innerHTML = renderMultiDxRefine();
    } else if (multiDxState.phase === 'results') {
      app.innerHTML = renderMultiDxResults();
    }
    bindMultiDxEvents();
    bindJournalEvents();
    progressEl.style.display = 'none';
  }
}

/* ── Transitions (Wizard) ── */
var transitioning = false;
function transitionToNode(nextId) {
  if (transitioning) return;
  transitioning = true;
  var app = document.getElementById('app');
  app.style.opacity = '0';
  app.style.transition = 'opacity 0.15s';
  setTimeout(function() {
    state.currentNode = nextId;
    render();
    app.style.opacity = '1';
    app.style.transition = 'opacity 0.3s';
    var first = app.querySelector('.opt-btn');
    if (first) first.focus();
    transitioning = false;
  }, 150);
}

/* ── Actions ── */
function selectOption(idx) {
  var node = TREE[state.currentNode];
  if (!node || !node.options || !node.options[idx]) return;
  state.history.push(state.currentNode);
  var nextId = node.options[idx].next;
  transitionToNode(nextId);
}

function goBack() {
  if (state.history.length === 0) return;
  var prevId = state.history.pop();
  transitionToNode(prevId);
}

function reset() {
  state.currentNode = ROOT;
  state.history = [];
  state.wizardNotes = {};
  transitionToNode(ROOT);
}

function setMode(mode) {
  if (mode === 'multi-dx' && !dataFileLoaded()) return;
  var prevMode = state.mode;
  state.mode = mode;

  if (prevMode === 'wizard' && mode === 'expert') {
    state.expertSelections = {};
    var currentId = ROOT;
    for (var i = 0; i < state.history.length; i++) {
      var node = TREE[currentId];
      if (!node || isResult(node)) break;
      for (var j = 0; j < node.options.length; j++) {
        if (node.options[j].next === state.history[i + 1] || (i === state.history.length - 1 && node.options[j].next === state.currentNode)) {
          state.expertSelections[currentId] = j;
          currentId = node.options[j].next;
          break;
        }
      }
    }
  }

  if (mode === 'multi-dx') {
    resetMultiDxState();
  }

  updateModeSelector();
  render();
}

function updateModeSelector() {
  var buttons = document.querySelectorAll('.mode-btn');
  for (var i = 0; i < buttons.length; i++) {
    var btn = buttons[i];
    var isActive = btn.getAttribute('data-mode') === state.mode;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-checked', isActive ? 'true' : 'false');
    btn.setAttribute('tabindex', isActive ? '0' : '-1');
  }
}

function expertSelect(nodeId, optionIdx, depth) {
  state.expertSelections[nodeId] = optionIdx;
  var currentId = ROOT;
  var newSelections = {};
  while (currentId) {
    var node = TREE[currentId];
    if (!node || isResult(node)) break;
    var sel = state.expertSelections[currentId];
    if (sel !== undefined && sel !== null) {
      newSelections[currentId] = sel;
      currentId = node.options[sel].next;
    } else {
      break;
    }
  }
  state.expertSelections = newSelections;

  if (currentId && TREE[currentId] && isResult(TREE[currentId])) {
    state.currentNode = currentId;
    state.history = [];
    var pathId = ROOT;
    while (pathId !== currentId) {
      var n = TREE[pathId];
      if (!n || isResult(n)) break;
      state.history.push(pathId);
      pathId = n.options[newSelections[pathId]].next;
    }
  }

  render();
}

function expertGoBack() {
  var path = [];
  var currentId = ROOT;
  while (currentId) {
    var node = TREE[currentId];
    if (!node || isResult(node)) break;
    var sel = state.expertSelections[currentId];
    if (sel !== undefined) { path.push(currentId); currentId = node.options[sel].next; }
    else break;
  }
  if (path.length > 0) {
    delete state.expertSelections[path[path.length - 1]];
  }
  render();
}

function getExpertResult() {
  var currentId = ROOT;
  while (currentId) {
    var node = TREE[currentId];
    if (!node) return null;
    if (isResult(node)) return node;
    var sel = state.expertSelections[currentId];
    if (sel !== undefined) { currentId = node.options[sel].next; }
    else { return null; }
  }
  return null;
}

/* ── Event Binding ── */
function bindWizardEvents() {
  var buttons = document.querySelectorAll('.opt-btn');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].addEventListener('click', function() {
      selectOption(parseInt(this.getAttribute('data-idx'), 10));
    });
  }
  var backBtn = document.getElementById('btn-back');
  if (backBtn) backBtn.addEventListener('click', goBack);
  var resetBtn = document.getElementById('btn-reset');
  if (resetBtn) resetBtn.addEventListener('click', reset);
  var saveTrackBtn = document.getElementById('btn-save-track');
  if (saveTrackBtn) {
    saveTrackBtn.addEventListener('click', function() {
      if (typeof saveToJournal === 'function') {
        saveToJournal();
      }
    });
  }
}

function bindExpertEvents() {
  var selects = document.querySelectorAll('.expert-select');
  for (var i = 0; i < selects.length; i++) {
    selects[i].addEventListener('change', function() {
      var nodeId = this.getAttribute('data-node');
      var depth = parseInt(this.getAttribute('data-depth'), 10);
      var val = this.value;
      if (val === '') {
        delete state.expertSelections[nodeId];
        var currentId = ROOT;
        var newSel = {};
        while (currentId) {
          var node = TREE[currentId];
          if (!node || isResult(node)) break;
          var s = state.expertSelections[currentId];
          if (s !== undefined) {
            newSel[currentId] = s;
            currentId = node.options[s].next;
          } else { break; }
        }
        state.expertSelections = newSel;
      } else {
        expertSelect(nodeId, parseInt(val, 10), depth);
        return;
      }
      render();
    });
  }
  var resetBtn = document.getElementById('btn-expert-reset');
  if (resetBtn) resetBtn.addEventListener('click', function() {
    state.expertSelections = {};
    state.currentNode = ROOT;
    state.history = [];
    state.wizardNotes = {};
    render();
  });
  var backBtn = document.getElementById('btn-back');
  if (backBtn) backBtn.addEventListener('click', expertGoBack);
  var resetBtn2 = document.getElementById('btn-reset');
  if (resetBtn2) resetBtn2.addEventListener('click', function() {
    state.expertSelections = {};
    state.currentNode = ROOT;
    state.history = [];
    state.wizardNotes = {};
    render();
  });
  var saveTrackBtn = document.getElementById('btn-save-track');
  if (saveTrackBtn) {
    saveTrackBtn.addEventListener('click', function() {
      if (typeof saveToJournal === 'function') {
        saveToJournal();
      }
    });
  }
}

/* ── Mode Selector Binding ── */
function bindModeSelector() {
  var container = document.querySelector('.mode-selector');
  if (!container) return;

  if (!dataFileLoaded()) {
    var multiBtn = container.querySelector('[data-mode="multi-dx"]');
    if (multiBtn) {
      multiBtn.setAttribute('aria-disabled', 'true');
      multiBtn.setAttribute('title', 'Data unavailable \u2014 load plant-doctor-data.js');
    }
  }

  container.addEventListener('click', function(e) {
    var btn = e.target.closest('.mode-btn');
    if (!btn || btn.getAttribute('aria-disabled') === 'true') return;
    setMode(btn.getAttribute('data-mode'));
  });

  container.addEventListener('keydown', function(e) {
    var modes = ['wizard', 'expert'];
    if (dataFileLoaded()) modes.push('multi-dx');
    var currentIdx = modes.indexOf(state.mode);
    var newIdx = currentIdx;

    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      newIdx = (currentIdx + 1) % modes.length;
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      newIdx = (currentIdx - 1 + modes.length) % modes.length;
    } else if (e.key === 'Home') {
      e.preventDefault();
      newIdx = 0;
    } else if (e.key === 'End') {
      e.preventDefault();
      newIdx = modes.length - 1;
    } else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      return;
    } else {
      return;
    }

    setMode(modes[newIdx]);
    var newBtn = container.querySelector('[data-mode="' + modes[newIdx] + '"]');
    if (newBtn) newBtn.focus();
  });
}

  storageAvailable = checkStorage();

    var warn = document.getElementById('storage-warn');
    warn.textContent = 'localStorage is unavailable. Your diagnosis will not be saved.';
    warn.style.display = 'block';

    lastDiagnosis = journalData.lastDiagnosis;

  renderLastDx();
  bindModeSelector();
  render();
}

    assert(multiDxState.phase === 'select', 'Edge: back at select phase stays at select');

    var smallJournal7 = [{ id: 'test', status: 'active', createdAt: new Date().toISOString() }];
    var evictResult7 = evictJournalEntry(smallJournal7);
    assert(evictResult7.length === 1, 'Edge: evict with < 20 entries does nothing');

    // ── 7.9 Performance Sanity Check ──

    var perfStart7 = performance.now ? performance.now() : Date.now();
    for (var perfI7 = 0; perfI7 < 100; perfI7++) {
      scoreDiagnoses(['yellow-lower', 'brown-tips', 'drooping', 'curling-up', 'spots-random'], 'veg', []);
    }
    var perfEnd7 = performance.now ? performance.now() : Date.now();
    var perfMs7 = perfEnd7 - perfStart7;
    assert(perfMs7 < 500, 'Performance: 100 scoring runs in ' + Math.round(perfMs7) + 'ms (target < 500ms)');

    } catch(e7) {
      assert(false, 'Integration test crashed: ' + e7.message);
    }

    // Restore integration test state
    state.mode = savedMode7;
    state.currentNode = savedNode7;
    state.history = savedHistory7;
    state.expertSelections = savedExpertSel7;
    state.wizardNotes = savedWizNotes7;
    multiDxState.stage = savedMdx7.stage;
    multiDxState.selectedSymptoms = savedMdx7.selectedSymptoms;
    multiDxState.notes = savedMdx7.notes;
    multiDxState.refineStep = savedMdx7.refineStep;
    multiDxState.refineQuestions = savedMdx7.refineQuestions;
    multiDxState.refineAnswers = savedMdx7.refineAnswers;
    multiDxState.scores = savedMdx7.scores;
    multiDxState.results = savedMdx7.results;
    multiDxState.phase = savedMdx7.phase;
    journalState.view = savedJournal7.view;
    journalState.activeEntryId = savedJournal7.activeEntryId;
    journalState.checkInData = savedJournal7.checkInData;
    journalData = savedJournalData7;
    lastDiagnosis = savedDx7;

  } else {
    console.log('SKIP: Integration tests requiring data file (7.2-7.9)');

    // Even without data file, backward-compat tests should run:
    state.mode = 'wizard';
    state.currentNode = ROOT;
    state.history = [];
    render();
    var appContent7 = document.getElementById('app').innerHTML;
    assert(appContent7.indexOf('opt-btn') !== -1, 'Backward compat (no data): wizard renders option buttons');

    state.mode = 'expert';
    state.expertSelections = {};
    render();
    var expertAppContent7 = document.getElementById('app').innerHTML;
    assert(expertAppContent7.indexOf('expert-select') !== -1, 'Backward compat (no data): expert renders dropdowns');

    var multiDxBtn7 = document.querySelector('[data-mode="multi-dx"]');
    if (multiDxBtn7) {
      assert(multiDxBtn7.getAttribute('aria-disabled') === 'true',
        'Backward compat (no data): multi-dx tab disabled');
    }

    state.mode = 'wizard';
    render();
  }

  // Restore state
  state.currentNode = savedState.currentNode;
  state.history = savedState.history;
  state.mode = savedState.mode;
  state.expertSelections = savedState.expertSelections;
  state.wizardNotes = savedState.wizardNotes;
  lastDiagnosis = savedDx;
  journalData = savedJournalData;
  journalState.view = savedJournalState.view;
  journalState.activeEntryId = savedJournalState.activeEntryId;
  journalState.checkInData = savedJournalState.checkInData;
  multiDxState.stage = savedMultiDxState.stage;
  multiDxState.selectedSymptoms = savedMultiDxState.selectedSymptoms;
  multiDxState.notes = savedMultiDxState.notes;
  multiDxState.refineStep = savedMultiDxState.refineStep;
  multiDxState.refineQuestions = savedMultiDxState.refineQuestions;
  multiDxState.refineAnswers = savedMultiDxState.refineAnswers;
  multiDxState.scores = savedMultiDxState.scores;
  multiDxState.results = savedMultiDxState.results;
  multiDxState.phase = savedMultiDxState.phase;
  render();

  console.log('\n' + passed + ' passed, ' + failed + ' failed');
}
