<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Doctor — GrowDoc</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Serif+4:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e0a; --bg2: #141a10; --bg3: #1a2214;
  --text: #d4cdb7; --text2: #a39e8a; --text3: #6b6756;
  --accent: #8fb856; --accent2: #6a9e3a; --accent3: #4a7a25;
  --gold: #c9a84c; --gold2: #a8872e;
  --red: #c45c4a; --red2: #a33d2d;
  --blue: #5a9eb8;
  --border: #2a3320; --border2: #3a4530;
  --serif: 'DM Serif Display', Georgia, serif;
  --body: 'Source Serif 4', Georgia, serif;
  --mono: 'IBM Plex Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 0;
  margin: 0;
}

.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* Header */
.header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
h1 { font-family: var(--serif); font-size: 1.8rem; color: var(--accent); margin-bottom: 2px; letter-spacing: -0.01em; }
.subtitle { font-size: 0.875rem; color: var(--text2); margin-bottom: 0; letter-spacing: 0.01em; }

/* Mode selector (segmented control) */
.mode-selector {
  display: flex; gap: 0; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 8px; padding: 3px; flex-shrink: 0;
}
.mode-btn {
  font-family: var(--mono); font-size: 0.78rem; font-weight: 600; padding: 8px 16px;
  border: none; border-radius: 6px; background: transparent; color: var(--text2);
  cursor: pointer; min-height: 36px; transition: background 0.15s, color 0.15s; white-space: nowrap;
}
.mode-btn:hover { background: rgba(143,184,86,0.08); color: var(--text); }
.mode-btn.active { background: var(--accent3); color: var(--text); }
.mode-btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
.mode-btn[aria-disabled="true"] { opacity: 0.35; cursor: not-allowed; }
.mode-btn[aria-disabled="true"]:hover { background: transparent; color: var(--text2); }
.mode-subtitle {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text3);
  text-align: right;
  margin-top: 4px;
}

/* Grow profile badges */
.grow-badges {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.grow-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text2);
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  /* min touch target 44px tall; visual padding kept compact */
  padding: 0 12px;
  min-height: 30px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  /* subtle edit indicator */
  position: relative;
}
/* small pencil caret to signal editability */
.grow-badge::after {
  content: '✎';
  font-size: 0.6rem;
  opacity: 0.4;
  margin-left: 2px;
  transition: opacity 0.15s;
}
.grow-badge:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(143,184,86,0.07);
}
.grow-badge:hover::after {
  opacity: 0.8;
}
.grow-badge:focus-visible {
  outline: 3px solid var(--accent);
  outline-offset: 2px;
}

/* Storage warning */
.storage-warn {
  background: rgba(201,168,76,0.15); border: 1px solid var(--gold2); border-radius: 8px;
  padding: 10px 14px; font-size: 0.82rem; margin-bottom: 16px; display: none; color: var(--gold);
}

/* Last diagnosis banner */
.last-dx {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px; margin-bottom: 20px; display: none;
}
.last-dx-header { font-family: var(--mono); font-size: 0.72rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.last-dx-name { font-family: var(--serif); font-size: 1.05rem; color: var(--accent); }
.last-dx-date { font-family: var(--mono); font-size: 0.72rem; color: var(--text3); margin-top: 2px; }

/* Progress dots */
.progress { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.dot {
  width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border2);
  transition: background 0.3s, border-color 0.3s;
}
.dot.done { background: var(--accent); border-color: var(--accent); }
@keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 0 rgba(143,184,86,0.5); } 50% { box-shadow: 0 0 0 6px rgba(143,184,86,0); } }
.dot.active { border-color: var(--accent); animation: pulse-dot 1.5s infinite; }
.dot-sep { width: 16px; height: 2px; background: var(--border2); border-radius: 1px; }
.dot-sep.done { background: var(--accent3); }
.progress-text {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text3);
  margin-left: 8px;
  vertical-align: middle;
}

/* Question card */
.q-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px 26px; margin-bottom: 20px;
}
.q-text { font-family: var(--serif); font-size: 1.2rem; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
.q-help { font-size: 0.83rem; color: var(--text2); font-style: italic; margin-bottom: 18px; line-height: 1.5; }

/* Option buttons */
.options { display: flex; flex-direction: column; gap: 8px; }
.opt-btn {
  display: block; width: 100%; text-align: left; padding: 14px 18px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-family: var(--body);
  font-size: 0.95rem; cursor: pointer; min-height: 44px;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, color 0.15s;
  /* subtle left stripe on hover to cue interactivity */
  border-left-width: 3px;
  padding-left: 16px;
}
.opt-btn:hover {
  border-color: var(--accent2);
  border-left-color: var(--accent);
  background: rgba(143,184,86,0.08);
  box-shadow: 0 1px 6px rgba(0,0,0,0.25);
}
.opt-btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
.opt-btn:active { transform: scale(0.99); }

/* Back / Start Over buttons */
.nav-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.btn {
  padding: 12px 24px; border-radius: 8px; font-family: var(--mono); font-size: 0.85rem; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border2); min-height: 44px; transition: background 0.15s, transform 0.1s, border-color 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
.btn-secondary { background: var(--bg3); color: var(--text2); }
.btn-secondary:hover { background: var(--border); color: var(--text); }
.btn-primary { background: var(--accent3); color: var(--text); border-color: var(--accent2); }
.btn-primary:hover { background: var(--accent2); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-danger {
  background: rgba(139, 26, 26, 0.3);
  border-color: var(--red);
  color: var(--red);
}
.btn-danger:hover {
  background: rgba(139, 26, 26, 0.5);
}
/* Copy button — distinct teal-accent treatment */
#btn-copy-dx {
  border-color: rgba(90, 158, 184, 0.45);
  color: var(--blue);
  margin-left: auto; /* push to far right of the nav row */
}
#btn-copy-dx:hover {
  background: rgba(90, 158, 184, 0.1);
  border-color: var(--blue);
  color: #fff;
}

/* Result card */
.result-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 26px 28px; margin-bottom: 24px; border-left: 4px solid var(--accent);
}
.result-card.sev-critical { border-left-color: var(--red); background: rgba(196,92,74,0.04); }
.result-card.sev-warning { border-left-color: var(--gold); background: rgba(201,168,76,0.04); }
.result-card.sev-note { border-left-color: var(--accent); }
.result-dx { font-family: var(--serif); font-size: 1.5rem; color: var(--text); margin-bottom: 10px; line-height: 1.25; }
.result-sev {
  display: inline-block; font-family: var(--mono); font-size: 0.72rem; font-weight: 600;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.8px;
}
.result-sev.sev-critical { background: rgba(196,92,74,0.2); color: var(--red); }
.result-sev.sev-warning { background: rgba(201,168,76,0.2); color: var(--gold); }
.result-sev.sev-note { background: rgba(143,184,86,0.2); color: var(--accent); }

/* Confidence bar */
.conf-wrap { margin-bottom: 18px; }
.conf-label { font-family: var(--mono); font-size: 0.72rem; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.8px; }
.conf-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.conf-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
/* severity-aware confidence bar colors */
.result-card.sev-critical .conf-fill { background: var(--red); }
.result-card.sev-warning .conf-fill { background: var(--gold); }
.conf-pct { font-family: var(--mono); font-size: 0.82rem; color: var(--text2); font-weight: 600; margin-top: 5px; }

/* Check first / fixes / also consider */
.result-section { margin-bottom: 18px; }
.result-section-title {
  font-family: var(--mono); font-size: 0.72rem; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
}
.result-ol { padding-left: 20px; }
.result-ol li { font-size: 0.9rem; color: var(--text2); margin-bottom: 7px; line-height: 1.6; }
.result-ol li strong { color: var(--text); font-weight: 600; }
.also-list { list-style: none; padding: 0; }
.also-item { font-size: 0.85rem; color: var(--text3); padding: 4px 0; }
.also-name { color: var(--text2); font-weight: 600; }
.also-hint { font-style: italic; }

/* Expert mode */
.expert-group { margin-bottom: 16px; }
.expert-label {
  display: block; font-family: var(--mono); font-size: 0.78rem; font-weight: 600;
  color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.expert-select {
  width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text); font-family: var(--body); font-size: 0.95rem;
  min-height: 44px; cursor: pointer; transition: border-color 0.2s;
}
.expert-select:focus { outline: 3px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
.expert-select:disabled { opacity: 0.4; cursor: not-allowed; }
.expert-help { font-size: 0.78rem; color: var(--text3); font-style: italic; margin-top: 4px; }

/* Fade animation */
@keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fade-in 0.3s ease-out; }

/* Notes expander */
.notes-expander {
  margin-top: 12px;
  margin-bottom: 8px;
}
.notes-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--text3);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  transition: color 0.15s;
}
.notes-toggle:hover {
  color: var(--text2);
}
.notes-toggle:focus-visible {
  outline: 3px solid var(--accent);
  outline-offset: 2px;
}
.notes-toggle-icon {
  display: inline-block;
  width: 14px;
  height: 14px;
  transition: transform 0.2s;
}
.notes-toggle-icon.open {
  transform: rotate(90deg);
}
.notes-body {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.25s ease-out, opacity 0.2s ease-out;
}
.notes-body.open {
  max-height: 220px;
  opacity: 1;
}
.notes-textarea {
  width: 100%;
  min-height: 60px;
  max-height: 150px;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--body);
  font-size: 0.85rem;
  resize: vertical;
  transition: border-color 0.2s;
}
.notes-textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.notes-textarea::placeholder {
  color: var(--text3);
  font-style: italic;
}
.notes-counter {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text3);
  text-align: right;
  margin-top: 4px;
}
.notes-counter.near-limit {
  color: var(--gold);
}
.notes-counter.at-limit {
  color: var(--red);
}
/* Notes display in result card */
.result-notes {
  margin-top: 20px;
  padding-top: 14px;
  border-top: 1px solid var(--border2);
}
.result-notes-title {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}
.result-note-item {
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 6px;
  padding-left: 10px;
  border-left: 2px solid var(--border2);
  line-height: 1.5;
}
.note-insights {
  margin-top: 18px;
  padding: 14px 16px;
  background: rgba(201, 168, 76, 0.08);
  border: 1px solid rgba(201, 168, 76, 0.35);
  border-left: 3px solid var(--gold);
  border-radius: 8px;
}
.note-insights-title {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.note-insights-title::before {
  content: '◆';
  font-size: 0.5rem;
  opacity: 0.7;
}
.note-insights-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.note-insights-item {
  font-size: 0.84rem;
  color: var(--text);
  line-height: 1.55;
  padding: 5px 0 5px 12px;
  border-left: 2px solid rgba(201, 168, 76, 0.4);
  margin-bottom: 8px;
}
.note-insights-item.priority-critical {
  border-left-color: var(--red);
}
.note-insights-item.priority-important {
  border-left-color: var(--gold);
}
.action-plan-title {
  color: var(--accent);
}
.action-plan-personalized {
  margin-bottom: 12px;
}
.action-step {
  font-size: 0.84rem;
  color: var(--text);
  line-height: 1.6;
  padding: 8px 0 8px 12px;
  border-left: 2px solid var(--border2);
  margin-bottom: 8px;
}
.action-step.priority-critical {
  border-left-color: var(--red);
}
.action-step.priority-important {
  border-left-color: var(--gold);
}
.general-tips {
  margin-top: 8px;
  border-top: 1px solid var(--border);
  padding-top: 8px;
}
.general-tips-toggle {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  cursor: pointer;
  list-style: none;
  padding: 4px 0;
}
.general-tips-toggle::-webkit-details-marker {
  display: none;
}
.general-tips-toggle::before {
  content: '\25B6';
  display: inline-block;
  margin-right: 6px;
  font-size: 0.6rem;
  transition: transform 0.2s;
}
.general-tips[open] > .general-tips-toggle::before {
  transform: rotate(90deg);
}
.general-tips-list {
  margin-top: 8px;
}
.general-tips-list li {
  color: var(--text3);
  font-size: 0.82rem;
}
.vpd-context {
  margin-top: 18px;
  padding: 12px 16px;
  background: rgba(90, 158, 184, 0.07);
  border: 1px solid rgba(90, 158, 184, 0.3);
  border-left: 3px solid var(--blue);
  border-radius: 8px;
}
.vpd-context-title {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.vpd-context-title::before {
  content: '◆';
  font-size: 0.5rem;
  opacity: 0.7;
}
.vpd-context-body {
  font-size: 0.84rem;
  color: var(--text);
  line-height: 1.55;
}
.result-note-step {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text3);
}

/* Multi-Dx: Growth stage selector */
.stage-selector {
  margin-bottom: 20px;
}
.stage-selector label {
  display: block;
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.stage-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.stage-pill {
  font-family: var(--body);
  font-size: 0.85rem;
  padding: 8px 14px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  min-height: 36px;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
}
.stage-pill:hover {
  border-color: var(--accent3);
  color: var(--text);
}
.stage-pill.selected {
  background: var(--accent3);
  border-color: var(--accent2);
  color: var(--text);
}
.stage-pill:focus-visible {
  outline: 3px solid var(--accent);
  outline-offset: 2px;
}
/* Multi-Dx: Symptom checkboxes */
.symptom-groups {
  margin-bottom: 20px;
}
.symptom-group {
  margin-bottom: 16px;
}
.symptom-group fieldset {
  border: none;
  padding: 0;
  margin: 0;
}
.symptom-group legend {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  padding: 0;
}
.symptom-check {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border: 1px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  min-height: 40px;
  transition: background 0.15s, border-color 0.15s;
  margin-bottom: 4px;
}
.symptom-check:hover {
  background: rgba(143, 184, 86, 0.06);
}
.symptom-check.checked {
  background: rgba(143, 184, 86, 0.1);
  border-color: var(--accent3);
}
.symptom-check input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}
.symptom-check-label {
  font-size: 0.9rem;
  color: var(--text);
  cursor: pointer;
}
/* Multi-Dx: Hints and warnings */
.dx-hint {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text3);
  font-style: italic;
  margin-bottom: 12px;
  padding: 8px 12px;
  background: rgba(143, 184, 86, 0.06);
  border-radius: 6px;
}
.dx-warning {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--gold);
  padding: 8px 12px;
  background: rgba(201, 168, 76, 0.1);
  border: 1px solid rgba(201, 168, 76, 0.2);
  border-radius: 6px;
  margin-bottom: 12px;
}
/* Multi-Dx: Results */
.dx-results-header {
  font-family: var(--serif);
  font-size: 1.3rem;
  color: var(--text);
  margin-bottom: 16px;
}
.dx-rank {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text3);
  margin-bottom: 4px;
}
.dx-supported-by {
  font-size: 0.82rem;
  color: var(--text3);
  margin-top: 8px;
  font-style: italic;
}
.combined-plan {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  margin-top: 24px;
}
.combined-plan-title {
  font-family: var(--serif);
  font-size: 1.15rem;
  color: var(--accent);
  margin-bottom: 16px;
}

/* Journal Dashboard */
.journal-dashboard {
  margin-bottom: 24px;
}
.journal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.journal-title {

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function formatAdviceSteps(text) {
  var escaped = escapeHtml(text);
  // Add line break before each step number (2) onwards
  escaped = escaped.replace(/\s*\((\d+)\)\s*/g, function(match, num) {
    if (num === '1') return '<strong>(' + num + ')</strong> ';
    return '<br><strong>(' + num + ')</strong> ';
  });
  return escaped;
}

function makeResult(o) {
  var r = {
    checkFirst: { default: ['Verify pH is in range for your medium'] },
    fixes: [],

  for (var k in o) { if (o.hasOwnProperty(k)) r[k] = o[k]; }

}

function resolveMediumText(textOrMap, medium) {
  if (Array.isArray(textOrMap)) return textOrMap;

  if (medium && textOrMap[medium]) return textOrMap[medium];

/* ── Scoring Engine ── */
function scoreDiagnoses(selectedSymptoms, stage, medium, lighting, treatedDiagnoses) {
  if (!selectedSymptoms || !Array.isArray(selectedSymptoms)) return [];
  var results = [];
  var selectedMap = {};
  for (var i = 0; i < selectedSymptoms.length; i++) {
    selectedMap[selectedSymptoms[i]] = true;
  }

  for (var diagId in SCORING) {
    if (!SCORING.hasOwnProperty(diagId)) continue;
    var entry = SCORING[diagId];
    var matched = [];
    var matchedWeight = 0;
    var totalWeight = 0;

    for (var symId in entry.symptoms) {
      if (!entry.symptoms.hasOwnProperty(symId)) continue;
      totalWeight += entry.symptoms[symId];
      if (selectedMap[symId]) {
        matchedWeight += entry.symptoms[symId];
        matched.push(symId);
      }
    }

    if (totalWeight === 0 || matched.length === 0) continue;

    var baseScore = matchedWeight / totalWeight;

    // Stage modifier
    var stageAdjust = 0;
    if (entry.stage_modifier && entry.stage_modifier[stage] !== undefined) {
      stageAdjust = entry.stage_modifier[stage];
    }

    // Medium modifier
    var mediumAdjust = 0;
    if (entry.medium_modifier && medium && entry.medium_modifier[medium] !== undefined) {
      mediumAdjust = entry.medium_modifier[medium];
    }

    // Lighting modifier
    var lightingAdjust = 0;
    if (entry.lighting_modifier && lighting && entry.lighting_modifier[lighting] !== undefined) {
      lightingAdjust = entry.lighting_modifier[lighting];
    }

    // Corroboration bonus
    var regionsHit = {};
    for (var mi = 0; mi < matched.length; mi++) {
      var sym = SYMPTOMS[matched[mi]];
      if (sym) regionsHit[sym.region] = true;
    }
    var regionCount = 0;
    for (var rk in regionsHit) {
      if (regionsHit.hasOwnProperty(rk)) regionCount++;
    }
    var corroboration = regionCount > 1 ? (regionCount - 1) * 0.05 : 0;

    // Clamp combined negative modifiers to prevent over-suppression
    var totalModifiers = stageAdjust + mediumAdjust + lightingAdjust;
    if (totalModifiers < -0.40) totalModifiers = -0.40;

    // Final score
    var finalScore = baseScore + totalModifiers + corroboration;
    finalScore = Math.min(finalScore, entry.base_confidence);
    finalScore = Math.max(0, Math.min(1, finalScore));

    // Treated penalty
    if (treatedDiagnoses && Array.isArray(treatedDiagnoses)) {
      for (var ti = 0; ti < treatedDiagnoses.length; ti++) {
        if (treatedDiagnoses[ti] === diagId) {
          finalScore = Math.max(0, finalScore - 0.2);
        }
      }
    }

    if (finalScore >= 0.25) {
      results.push({ resultId: diagId, score: finalScore, matchedSymptoms: matched });
    }
  }

  results.sort(function(a, b) { return b.score - a.score; });
  return results.slice(0, 5);
}

function getAdjustedConfidence(node, medium, lighting) {
  if (!node || !node.id || !dataFileLoaded()) return node ? node.confidence : 0;
  var entry = window.SCORING ? window.SCORING[node.id] : null;
  if (!entry) return node.confidence;

  var adjust = 0;
  if (entry.medium_modifier && medium && entry.medium_modifier[medium] !== undefined) {
    adjust += entry.medium_modifier[medium];
  }
  if (entry.lighting_modifier && lighting && entry.lighting_modifier[lighting] !== undefined) {
    adjust += entry.lighting_modifier[lighting];
  }

  // Clamp negative adjustment
  if (adjust < -0.40) adjust = -0.40;

  var result = node.confidence + adjust;
  // Clamp to 0.05-1.0 range
  if (result < 0.05) result = 0.05;
  if (result > 1.0) result = 1.0;
  return result;
}

function getRefineQuestions(rankedDiagnoses) {
  var matched = [];
  for (var i = 0; i < REFINE_RULES.length; i++) {
    var rule = REFINE_RULES[i];
    try {
      if (rule.condition(rankedDiagnoses)) {
        matched.push(rule);
      }
    } catch (e) {
      // Skip rules with broken conditions
    }
  }
  return matched;
}

function applyRefineAnswer(scores, ruleId, optionIndex) {
  // Find the rule
  var rule = null;
  for (var i = 0; i < REFINE_RULES.length; i++) {
    if (REFINE_RULES[i].id === ruleId) { rule = REFINE_RULES[i]; break; }
  }
  if (!rule || !rule.options[optionIndex]) return scores.slice();

  var adjust = rule.options[optionIndex].adjust;

  // Deep copy scores
  var updated = [];
  for (var j = 0; j < scores.length; j++) {
    updated.push({
      resultId: scores[j].resultId,
      score: scores[j].score,
      matchedSymptoms: scores[j].matchedSymptoms.slice()
    });
  }

  // Apply adjustments
  for (var k = 0; k < updated.length; k++) {
    if (adjust[updated[k].resultId] !== undefined) {
      updated[k].score += adjust[updated[k].resultId];
      updated[k].score = Math.max(0, Math.min(1, updated[k].score));
    }
  }

  // Re-sort
  updated.sort(function(a, b) { return b.score - a.score; });
  return updated;
}

function generateCombinedPlan(topDiagnoses, medium) {
  var checkFirstSet = {};
  var checkFirstList = [];
  var fixEntries = [];
  var alsoSet = {};
  var alsoList = [];

  for (var i = 0; i < topDiagnoses.length; i++) {
    var diag = topDiagnoses[i];
    var treeNode = TREE[diag.resultId];
    if (!treeNode || !isResult(treeNode)) continue;

    // checkFirst — resolve through medium helper, then deduplicate
    var resolvedCheckFirst = resolveMediumText(treeNode.checkFirst, medium);
    for (var ci = 0; ci < resolvedCheckFirst.length; ci++) {
      var cf = resolvedCheckFirst[ci];
      if (!checkFirstSet[cf]) {
        checkFirstSet[cf] = true;
        checkFirstList.push(cf);
      }
    }

    // fixes — resolve through medium helper, then track count and rank
    var resolvedFixes = resolveMediumText(treeNode.fixes, medium);
    for (var fi = 0; fi < resolvedFixes.length; fi++) {
      fixEntries.push({ fix: resolvedFixes[fi], rank: i, diagId: diag.resultId });
    }

    // alsoConsider — deduplicate by name
    if (treeNode.alsoConsider) {
      for (var ai = 0; ai < treeNode.alsoConsider.length; ai++) {
        var ac = treeNode.alsoConsider[ai];
        if (!alsoSet[ac.name]) {
          alsoSet[ac.name] = true;
          alsoList.push(ac);
        }
      }
    }
  }

  // Deduplicate and order fixes
  var fixCount = {};
  var fixFirstRank = {};
  for (var fe = 0; fe < fixEntries.length; fe++) {
    var f = fixEntries[fe].fix;
    if (fixCount[f] === undefined) {
      fixCount[f] = 0;
      fixFirstRank[f] = fixEntries[fe].rank;
    }
    fixCount[f]++;
    if (fixEntries[fe].rank < fixFirstRank[f]) {
      fixFirstRank[f] = fixEntries[fe].rank;
    }
  }

  var uniqueFixes = [];
  var fixSeen = {};
  for (var uf = 0; uf < fixEntries.length; uf++) {
    if (!fixSeen[fixEntries[uf].fix]) {
      fixSeen[fixEntries[uf].fix] = true;
      uniqueFixes.push(fixEntries[uf].fix);
    }
  }

  uniqueFixes.sort(function(a, b) {
    if (fixCount[b] !== fixCount[a]) return fixCount[b] - fixCount[a];
    return fixFirstRank[a] - fixFirstRank[b];
  });

  return {
    checkFirst: checkFirstList,
    fixes: uniqueFixes,
    alsoConsider: alsoList
  };
}

/* ── Undo Stack ── */
var undoStack = [];
var UNDO_MAX = 5;

function pushUndo(label) {
  undoStack.push({
    label: label,
    timestamp: Date.now(),
    snapshot: {
      currentNode: state.currentNode,
      history: state.history.slice(),
      mode: state.mode,
      wizardNotes: JSON.parse(JSON.stringify(state.wizardNotes)),
      expertSelections: JSON.parse(JSON.stringify(state.expertSelections)),
      medium: state.medium,
      lighting: state.lighting,
      activePlantId: activePlantId,
      multiDxPhase: multiDxState.phase,
      multiDxSymptoms: multiDxState.selectedSymptoms.slice(),
      multiDxStage: multiDxState.stage,
      multiDxNotes: JSON.parse(JSON.stringify(multiDxState.notes))
    }
  });
  if (undoStack.length > UNDO_MAX) undoStack.shift();
}

function popUndo() {
  if (undoStack.length === 0) return false;
  var entry = undoStack.pop();
  var snap = entry.snapshot;

  state.currentNode = snap.currentNode;
  state.history = snap.history;
  state.mode = snap.mode;
  state.wizardNotes = snap.wizardNotes;
  state.expertSelections = snap.expertSelections;
  state.medium = snap.medium;
  state.lighting = snap.lighting;

  if (snap.activePlantId !== activePlantId && typeof setActivePlant === 'function') {
    activePlantId = snap.activePlantId;
    // Don't call setActivePlant since we're restoring full state
  }

  multiDxState.phase = snap.multiDxPhase;
  multiDxState.selectedSymptoms = snap.multiDxSymptoms;
  multiDxState.stage = snap.multiDxStage;
  if (snap.multiDxNotes) multiDxState.notes = snap.multiDxNotes;

  if (typeof updateModeSelector === 'function') updateModeSelector();
  if (typeof renderPlantSidebar === 'function') renderPlantSidebar();
  render();
  return true;
}

function canUndo() {
  return undoStack.length > 0;
}

function getUndoLabel() {
  if (undoStack.length === 0) return '';
  return undoStack[undoStack.length - 1].label;
}

function resetMultiDxState() {
  var preservedMedium = multiDxState.medium;
  var preservedLighting = multiDxState.lighting;
  multiDxState.stage = null;
  multiDxState.selectedSymptoms = [];
  multiDxState.notes = {};
  multiDxState.refineStep = 0;
  multiDxState.refineQuestions = [];
  multiDxState.refineAnswers = [];
  multiDxState.scores = {};
  multiDxState.results = [];
  multiDxState.phase = 'select';
  multiDxState.medium = preservedMedium;
  multiDxState.lighting = preservedLighting;
}

function dataFileLoaded() {
  return typeof SYMPTOMS !== 'undefined' && typeof SCORING !== 'undefined' && typeof REFINE_RULES !== 'undefined';
}

/* ── Multi-Dx Helpers ── */
function toggleSymptom(symptomId) {
  var idx = multiDxState.selectedSymptoms.indexOf(symptomId);
  if (idx === -1) {
    multiDxState.selectedSymptoms.push(symptomId);
  } else {
    multiDxState.selectedSymptoms.splice(idx, 1);
  }
}

function canDiagnose() {
  return multiDxState.stage !== null && multiDxState.selectedSymptoms.length >= 2;
}

function runMultiDxDiagnosis() {
  var scores = scoreDiagnoses(multiDxState.selectedSymptoms, multiDxState.stage, multiDxState.medium, multiDxState.lighting, []);
  var mdxNoteCtx = extractNoteContext(multiDxState.notes);
  // adjustScoresFromNotes operates on a plain object map; convert array to map, adjust, convert back
  var scoresMap = {};
  for (var smi = 0; smi < scores.length; smi++) {
    scoresMap[scores[smi].resultId] = scores[smi].score;
  }
  scoresMap = adjustScoresFromNotes(scoresMap, mdxNoteCtx);
  for (var smj = 0; smj < scores.length; smj++) {
    if (scoresMap[scores[smj].resultId] !== undefined) {
      scores[smj].score = scoresMap[scores[smj].resultId];
    }
  }
  // Re-sort after adjustment
  scores.sort(function(a, b) { return b.score - a.score; });
  multiDxState.results = scores;
  var refineQs = getRefineQuestions(scores);
  multiDxState.refineQuestions = refineQs;
  multiDxState.refineStep = 0;
  multiDxState.refineAnswers = [];
  if (refineQs.length > 0) {
    multiDxState.phase = 'refining';
  } else {
    multiDxState.phase = 'results';
  }
}

function answerRefineQuestion(optionIndex) {
  var currentRule = multiDxState.refineQuestions[multiDxState.refineStep];
  if (!currentRule) return;
  multiDxState.refineAnswers.push({ ruleId: currentRule.id, optionIndex: optionIndex });
  multiDxState.results = applyRefineAnswer(multiDxState.results, currentRule.id, optionIndex);
  multiDxState.refineStep++;
  if (multiDxState.refineStep >= multiDxState.refineQuestions.length) {
    multiDxState.phase = 'results';
  }
}

function _reScoreWithNoteContext(scores) {
  var mdxNoteCtx = extractNoteContext(multiDxState.notes);
  var scoresMap = {};
  for (var i = 0; i < scores.length; i++) {
    scoresMap[scores[i].resultId] = scores[i].score;
  }
  scoresMap = adjustScoresFromNotes(scoresMap, mdxNoteCtx);
  for (var j = 0; j < scores.length; j++) {
    if (scoresMap[scores[j].resultId] !== undefined) {
      scores[j].score = scoresMap[scores[j].resultId];
    }
  }
  scores.sort(function(a, b) { return b.score - a.score; });
  return scores;
}

function multiDxGoBack() {
  if (multiDxState.phase === 'results') {
    if (multiDxState.refineQuestions.length > 0) {
      multiDxState.phase = 'refining';
      multiDxState.refineStep = multiDxState.refineQuestions.length - 1;
      multiDxState.refineAnswers.pop();
      var scores = scoreDiagnoses(multiDxState.selectedSymptoms, multiDxState.stage, multiDxState.medium, multiDxState.lighting, []);
      scores = _reScoreWithNoteContext(scores);
      for (var i = 0; i < multiDxState.refineAnswers.length; i++) {
        var ans = multiDxState.refineAnswers[i];
        scores = applyRefineAnswer(scores, ans.ruleId, ans.optionIndex);
      }
      multiDxState.results = scores;
    } else {
      multiDxState.phase = 'select';
    }
  } else if (multiDxState.phase === 'refining') {
    if (multiDxState.refineStep > 0) {
      multiDxState.refineStep--;
      multiDxState.refineAnswers.pop();
      var scores2 = scoreDiagnoses(multiDxState.selectedSymptoms, multiDxState.stage, multiDxState.medium, multiDxState.lighting, []);
      scores2 = _reScoreWithNoteContext(scores2);
      for (var j = 0; j < multiDxState.refineAnswers.length; j++) {
        var ans2 = multiDxState.refineAnswers[j];
        scores2 = applyRefineAnswer(scores2, ans2.ruleId, ans2.optionIndex);
      }
      multiDxState.results = scores2;
    } else {
      multiDxState.phase = 'select';
    }
  }
}

var journalData = { version: 2, journal: [], migrateCount: 0 };

function generateId() {

function createJournalEntry(mode, primaryResultId, diagnoses, combinedPlan, notes) {
  return {
    id: generateId(),

    notes: notes ? JSON.parse(JSON.stringify(notes)) : {},
    diagnoses: diagnoses ? diagnoses.map(function(d) {
      return { resultId: d.resultId, confidence: d.score || d.confidence, rank: d.rank || 0 };
    }) : [],
    combinedPlan: combinedPlan ? JSON.parse(JSON.stringify(combinedPlan)) : null,
    treatments: [],
    checkIns: [],
    status: 'active'
  };
}

function evictJournalEntry(journal) {
  if (journal.length < 20) return journal;

  var oldestResolvedIdx = -1;
  var oldestResolvedDate = null;
  for (var i = 0; i < journal.length; i++) {
    if (journal[i].status === 'resolved') {
      var d = new Date(journal[i].createdAt);
      if (oldestResolvedIdx === -1 || d < oldestResolvedDate) {
        oldestResolvedIdx = i;
        oldestResolvedDate = d;
      }
    }
  }

  if (oldestResolvedIdx !== -1) {
    journal.splice(oldestResolvedIdx, 1);
    return journal;
  }

  var oldestIdx = 0;
  var oldestDate = new Date(journal[0].createdAt);
  for (var j = 1; j < journal.length; j++) {
    var dj = new Date(journal[j].createdAt);
    if (dj < oldestDate) {
      oldestIdx = j;
      oldestDate = dj;
    }
  }
  journal.splice(oldestIdx, 1);
  return journal;
}

function createTreatments(actions) {
  var treatments = [];
  for (var i = 0; i < actions.length; i++) {
    treatments.push({
      action: actions[i],
      startedAt: new Date().toISOString(),
      status: 'active'
    });
  }
  return treatments;
}

function createCheckInRecord(response, symptomsResolved, symptomsNew, notes) {

    symptomsResolved: symptomsResolved || [],
    symptomsNew: symptomsNew || [],
    notes: notes || '',
    updatedScores: null
  };
}

function getJournalEntry(id) {

  }
  return null;
}

/* ── localStorage v2 Schema and Migration ── */
function loadStateV2() {
  if (!storageAvailable) return { version: 2, journal: [], migrateCount: 0 };
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { version: 2, journal: [], migrateCount: 0 };
    var data = JSON.parse(raw);

    if (data.version === 2) {
      if (!Array.isArray(data.journal)) {
        data.journal = [];
        var warn = document.getElementById('storage-warn');
        if (warn) {
          warn.textContent = 'Journal data was corrupted and has been reset.';
          warn.style.display = 'block';
        }
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) { /* quota */ }
      }
      if (typeof data.migrateCount === 'number') {
        data.migrateCount++;
        if (data.migrateCount >= 5) {
          localStorage.removeItem(STORAGE_KEY + '-v1-backup');
        }
      }
      return data;
    }

    if (data.version === 1) {
      localStorage.setItem(STORAGE_KEY + '-v1-backup', raw);

      var journal = [];
      if (data.lastDiagnosis) {
        var ld = data.lastDiagnosis;
        journal.push({
          id: generateId(),
          createdAt: ld.date || new Date().toISOString(),
          stage: null,
          mode: 'wizard',
          symptoms: [],
          notes: {},
          diagnoses: [{ resultId: ld.result.id, confidence: ld.result.confidence, rank: 1 }],
          combinedPlan: null,
          treatments: [],
          checkIns: [],
          status: 'resolved'
        });
      }

      var v2Data = {
        version: 2,
        journal: journal,
        migrateCount: 0,
        lastDiagnosis: data.lastDiagnosis
      };

      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(v2Data)); } catch(e) { /* quota */ }
      return v2Data;
    }

    return { version: 2, journal: [], migrateCount: 0 };
  } catch(e) {
    var warn2 = document.getElementById('storage-warn');
    if (warn2) {
      warn2.textContent = 'Saved data was corrupted and has been reset.';
      warn2.style.display = 'block';
    }
    try { localStorage.removeItem(STORAGE_KEY); } catch(e2) { /* ignore */ }
    return { version: 2, journal: [], migrateCount: 0 };
  }
}

function saveToJournal() {

    entry.symptoms = multiDxState.selectedSymptoms.slice();
  } else {
    var node = TREE[state.currentNode];
    if (!node || !isResult(node)) return;
    // Filter wizard notes to steps in the current path to exclude
    // stale notes from abandoned back-navigation paths.
    // If history is empty, include all notes (no abandoned paths possible).
    var filteredNotes = {};
    if (state.history.length === 0) {
      filteredNotes = state.wizardNotes;
    } else {
      var visited = {};
      for (var si = 0; si < state.history.length; si++) visited[state.history[si]] = true;
      visited[state.currentNode] = true;
      for (var nk in state.wizardNotes) {
        if (state.wizardNotes.hasOwnProperty(nk) && state.wizardNotes[nk] && visited[nk]) {
          filteredNotes[nk] = state.wizardNotes[nk];
        }
      }
    }
    entry = createJournalEntry(
      state.mode,
      node.id,
      [{ resultId: node.id, score: node.confidence, rank: 1 }],
      null,
      filteredNotes
    );
  }

  if (journalData.journal.length >= 20) {
    journalData.journal = evictJournalEntry(journalData.journal);
  }

  journalData.journal.push(entry);
  saveJournalState(journalData);

  journalState.view = 'treatment-select';
  journalState.activeEntryId = entry.id;
  render();
}

/* ── Node Helpers ── */
function isResult(node) {
  return node && typeof node.diagnosis === 'string';
}

/* ── Rendering: Progress Dots ── */
function renderProgress() {
  var el = document.getElementById('progress');
  var node = TREE[state.currentNode];
  var steps = state.history.length;
  var atResult = isResult(node);
  var total = steps + (atResult ? 0 : 1);
  var maxPossible = 5;
  var html = '';
  for (var i = 0; i < Math.min(total, maxPossible); i++) {
    if (i > 0) html += '<div class="dot-sep' + (i <= steps ? ' done' : '') + '"></div>';
    if (i < steps) {
      html += '<div class="dot done"></div>';
    } else if (i === steps && !atResult) {
      html += '<div class="dot active"></div>';
    } else {
      html += '<div class="dot"></div>';
    }
  }
  if (atResult && steps > 0) {
    html = '';
    for (var j = 0; j < Math.min(steps, maxPossible); j++) {
      if (j > 0) html += '<div class="dot-sep done"></div>';
      html += '<div class="dot done"></div>';
    }
  }
  el.innerHTML = html;
  var totalSteps = Math.min(total, maxPossible);
  el.setAttribute('aria-label', 'Diagnosis progress: step ' + (steps + 1) + ' of approximately ' + totalSteps);
  var stepText = document.getElementById('progress-text');
  if (!stepText) {
    stepText = document.createElement('span');
    stepText.id = 'progress-text';
    stepText.className = 'progress-text';
    el.appendChild(stepText);
  }
  stepText.textContent = 'Step ' + (steps + 1);
}

/* ── Rendering: Wizard Question ── */
function renderWizardQuestion(node) {

/* ── Note-Aware Diagnosis Engine ── */
function noteContextRulesLoaded() {
  return typeof KEYWORD_PATTERNS !== 'undefined' && typeof ADVICE_RULES !== 'undefined';
}

function extractNoteContext(notes) {
  var ctx = {
    plantType: null,
    timeline: null,
    timelineDays: null,
    scope: null,
    medium: null,
    lighting: null,
    temp: null,
    rh: null,
    ph: null,
    ec: null,
    wateringPattern: null,
    previousTreatment: null,
    severity: null,
    growerIntent: null,
    plantHealth: null,
    symptomLocation: null,
    recentEvent: null,
    envEvent: null,
    rootHealth: null,
    feedType: null,
    waterType: null,
    stage: null,
    flowerWeek: null,
    keywords: [],
    rawText: ''
  };

  if (!notes || typeof notes !== 'object') return ctx;
  if (!noteContextRulesLoaded()) return ctx;

  // Concatenate all notes into one string for pattern matching
  var allText = '';
  for (var key in notes) {
    if (notes.hasOwnProperty(key) && notes[key]) {
      allText += ' ' + notes[key];
    }
  }
  allText = allText.trim();
  ctx.rawText = allText;
  if (!allText) return ctx;

  // Run all keyword patterns
  for (var i = 0; i < KEYWORD_PATTERNS.length; i++) {
    var rule = KEYWORD_PATTERNS[i];
    var match = allText.match(rule.pattern);
    if (match) {
      if (rule.extract === 'days' && match[1]) {
        ctx.timelineDays = parseInt(match[1], 10);
        if (ctx.timelineDays <= 7) ctx.timeline = 'recent';
        else if (ctx.timelineDays <= 28) ctx.timeline = 'ongoing';
        else ctx.timeline = 'chronic';
      } else if (rule.extract === 'weeks-to-days' && match[1]) {
        var weeks = parseInt(match[1], 10);
        ctx.timelineDays = weeks * 7;
        if (ctx.timelineDays <= 7) ctx.timeline = 'recent';
        else if (ctx.timelineDays <= 28) ctx.timeline = 'ongoing';
        else ctx.timeline = 'chronic';
      } else if (rule.extract === 'temp' && match[1]) {
        ctx.temp = parseFloat(match[1]);
      } else if (rule.extract === 'temp-f' && match[1]) {
        // Convert Fahrenheit to Celsius for consistent numeric comparisons
        ctx.temp = Math.round(((parseFloat(match[1]) - 32) * 5 / 9) * 10) / 10;
      } else if (rule.extract === 'rh' && match[1]) {
        ctx.rh = parseFloat(match[1]);
      } else if (rule.extract === 'ph' && match[1]) {
        ctx.ph = parseFloat(match[1]);
      } else if (rule.extract === 'ec' && match[1]) {
        ctx.ec = parseFloat(match[1]);
      } else if (rule.extract === 'weeks' && match[1]) {
        ctx.flowerWeek = parseInt(match[1], 10);
        if (!ctx.stage) {
          if (ctx.flowerWeek <= 3) ctx.stage = 'early-flower';
          else if (ctx.flowerWeek <= 6) ctx.stage = 'mid-flower';
          else ctx.stage = 'late-flower';
        }
      } else if (rule.field && rule.value) {
        ctx[rule.field] = rule.value;
      }
      ctx.keywords.push(rule.id || rule.field);
    }
  }

  return ctx;
}

function generateContextualAdvice(noteContext, diagnosisId) {
  if (!noteContextRulesLoaded() || !noteContext || !noteContext.rawText) return [];

  var adviceItems = [];
  for (var i = 0; i < ADVICE_RULES.length; i++) {
    var rule = ADVICE_RULES[i];
    try {
      if (rule.condition(noteContext, diagnosisId)) {
        adviceItems.push({ text: rule.advice, priority: rule.priority || 5, id: rule.id });
      }
    } catch(e) {
      // Skip rules that error
    }
  }

  // Sort by priority descending
  adviceItems.sort(function(a, b) { return (b.priority || 5) - (a.priority || 5); });

  // Smart cap: if any top item is a long protocol (>200 chars), cap at 3
  var maxItems = 5;
  for (var ci = 0; ci < Math.min(adviceItems.length, 3); ci++) {
    if (adviceItems[ci].text.length > 200) {
      maxItems = 3;
      break;
    }
  }

  // Return top items as objects with text and priority
  var result = [];
  for (var j = 0; j < Math.min(adviceItems.length, maxItems); j++) {
    result.push({ text: adviceItems[j].text, priority: adviceItems[j].priority || 5 });
  }
  return result;
}

function adjustScoresFromNotes(scores, noteContext) {
  if (!noteContextRulesLoaded() || !noteContext || !noteContext.rawText) return scores;
  if (typeof SCORE_ADJUSTMENTS === 'undefined') return scores;

  for (var i = 0; i < SCORE_ADJUSTMENTS.length; i++) {
    var rule = SCORE_ADJUSTMENTS[i];
    try {
      if (rule.condition(noteContext)) {
        for (var diagId in rule.adjustments) {
          if (rule.adjustments.hasOwnProperty(diagId) && scores[diagId] !== undefined) {
            scores[diagId] += rule.adjustments[diagId];
            if (scores[diagId] < 0) scores[diagId] = 0;
          }
        }
      }
    } catch(e) {
      // Skip rules that error
    }
  }
  return scores;
}

/* ── Rendering: Result Card ── */
var severityLabels = { critical: 'Urgent', warning: 'Needs attention', note: 'Monitor' };
function renderResultCard(node) {
  var sevClass = 'sev-' + node.severity;
  var sevLabel = severityLabels[node.severity] || node.severity;
  var adjustedConf = (typeof getAdjustedConfidence === 'function') ? getAdjustedConfidence(node, state.medium, state.lighting) : node.confidence;
  var pct = Math.round(adjustedConf * 100);
  var html = '<div class="result-card ' + sevClass + ' fade-in" tabindex="-1" id="result-card" role="region" aria-label="Diagnosis result">';
  html += '<span class="sr-only">Diagnosis result: ' + escapeHtml(node.diagnosis) + ', severity ' + escapeHtml(sevLabel) + ', confidence ' + pct + ' percent</span>';
  if (node.urgency === 'time-sensitive') {
    html += '<div class="result-alert" role="alert" aria-live="assertive">';
    html += '<span class="alert-icon">\u26A0</span>';
    html += '<div><div>Act today \u2014 pollen spreads fast</div>';
    html += '<div class="alert-timeline">Remove with tweezers, mist the area, inspect daily. See fix steps below.</div>';
    html += '</div></div>';
  }
  html += '<div class="result-dx">' + escapeHtml(node.diagnosis) + '</div>';
  html += '<span class="result-sev ' + sevClass + '">' + escapeHtml(sevLabel) + '</span>';
  html += '<div class="conf-wrap"><div class="conf-label">Confidence</div>';
  html += '<div class="conf-bar" role="progressbar" aria-valuenow="' + pct + '" aria-valuemin="0" aria-valuemax="100" aria-label="Confidence ' + pct + '%"><div class="conf-fill" style="width:' + pct + '%"></div></div>';
  html += '<div class="conf-pct">' + pct + '%</div></div>';

  // Notes display (resolved early so advice can use it)
  var notesToShow = {};
  if (state.mode === 'multi-dx') {
    notesToShow = multiDxState.notes;
  } else {
    // Filter wizard notes to only include steps from the current path
    // (history + current node) to avoid stale notes from abandoned paths.
    // If history is empty we are either at the start or in a test — show all.
    if (state.history.length === 0) {
      notesToShow = state.wizardNotes;
    } else {
      var visitedSteps = {};
      for (var vi = 0; vi < state.history.length; vi++) visitedSteps[state.history[vi]] = true;
      visitedSteps[state.currentNode] = true;
      for (var wk in state.wizardNotes) {
        if (state.wizardNotes.hasOwnProperty(wk) && state.wizardNotes[wk] && visitedSteps[wk]) {
          notesToShow[wk] = state.wizardNotes[wk];
        }
      }
    }
  }

  // Unified Action Plan: merge personalized advice + generic fixes
  var noteCtx = extractNoteContext(notesToShow);
  var adviceItems = generateContextualAdvice(noteCtx, node.id);
  var fixItems = resolveMediumText(node.fixes, state.medium);

  var hasPersonalized = adviceItems.length > 0;
  var sectionTitle = hasPersonalized ? 'Your Action Plan' : 'How to Fix';

  html += '<div class="result-section">';
  html += '<div class="result-section-title' + (hasPersonalized ? ' action-plan-title' : '') + '">' + escapeHtml(sectionTitle) + '</div>';

  // Personalized steps first (from note-aware advice)
  if (hasPersonalized) {
    html += '<div class="action-plan-personalized">';
    for (var ap = 0; ap < adviceItems.length; ap++) {
      var item = adviceItems[ap];
      var itemText = typeof item === 'object' ? item.text : item;
      var itemPriority = typeof item === 'object' ? (item.priority || 5) : 5;
      var prioClass = itemPriority >= 9 ? ' priority-critical' : (itemPriority >= 7 ? ' priority-important' : '');
      html += '<div class="action-step' + prioClass + '">' + formatAdviceSteps(itemText) + '</div>';
    }
    html += '</div>';
  }

  // Generic fixes (collapsible if personalized content exists, full if not)
  if (fixItems.length > 0) {
    if (hasPersonalized) {
      // Collapsible "General Tips"
      html += '<details class="general-tips">';
      html += '<summary class="general-tips-toggle">General Tips</summary>';
      html += '<ol class="result-ol general-tips-list">';
      for (var gf = 0; gf < fixItems.length; gf++) {
        html += '<li>' + escapeHtml(fixItems[gf]) + '</li>';
      }
      html += '</ol></details>';
    } else {
      // No personalized content — show fixes normally
      html += '<ol class="result-ol">';
      for (var nf = 0; nf < fixItems.length; nf++) {
        html += '<li>' + escapeHtml(fixItems[nf]) + '</li>';
      }
      html += '</ol>';
    }
  }

  html += '</div>';
  var checkFirstItems = resolveMediumText(node.checkFirst, state.medium);
  if (checkFirstItems.length > 0) {
    html += '<div class="result-section"><div class="result-section-title">Verify First</div><ol class="result-ol">';
    for (var c = 0; c < checkFirstItems.length; c++) html += '<li>' + escapeHtml(checkFirstItems[c]) + '</li>';
    html += '</ol></div>';
  }
  if (node.alsoConsider && node.alsoConsider.length > 0) {
    html += '<div class="result-section"><div class="result-section-title">Also Consider</div><ul class="also-list">';
    for (var a = 0; a < node.alsoConsider.length; a++) {
      html += '<li class="also-item"><span class="also-name">' + escapeHtml(node.alsoConsider[a].name) + '</span>';
      if (node.alsoConsider[a].hint) html += ' &mdash; <span class="also-hint">' + escapeHtml(node.alsoConsider[a].hint) + '</span>';
      html += '</li>';
    }
    html += '</ul></div>';
  }

  // Your Notes display
  var hasNotes = false;
  for (var nk in notesToShow) {
    if (notesToShow.hasOwnProperty(nk) && notesToShow[nk]) { hasNotes = true; break; }
  }
  if (hasNotes) {
    html += '<div class="result-notes">';
    html += '<div class="result-notes-title">Your Notes</div>';
    for (var noteKey in notesToShow) {
      if (!notesToShow.hasOwnProperty(noteKey) || !notesToShow[noteKey]) continue;
      html += '<div class="result-note-item">';
      html += '<span class="result-note-step">' + escapeHtml(noteKey) + '</span><br>';
      html += escapeHtml(notesToShow[noteKey]);
      html += '</div>';
    }
    html += '</div>';
  }

  // VPD context
  if (node.vpdContext) {
    html += '<div class="vpd-context">';
    html += '<div class="vpd-context-title">Environment Check</div>';
    html += '<div class="vpd-context-body">' + escapeHtml(node.vpdContext) + '</div>';
    html += '</div>';
  }

  html += '</div>';
  html += '<div class="nav-row">';
  html += '<button class="btn btn-primary" id="btn-save-track" type="button">Save &amp; Start Tracking</button>';
  html += '<button class="btn btn-secondary" id="btn-reset" type="button">Start Over</button>';
  if (state.history.length > 0) {
    html += '<button class="btn btn-secondary" id="btn-back" type="button">Back</button>';
  }
  html += '<button class="btn btn-secondary" id="btn-copy-dx" type="button">&#128203; Copy Diagnosis</button>';
  html += '</div>';
  return html;
}

/* ── Rendering: Expert Mode ── */
function renderExpert() {
  var html = '';
  var currentId = ROOT;
  var depth = 0;
  var reachedResult = false;

  // Pre-populate medium/lighting from saved profile so cascading starts from q-stage
  if (state.medium && state.expertSelections['q-medium'] === undefined) {
    var mediumIdx = { soil: 0, coco: 1, hydro: 2, soilless: 3 };
    state.expertSelections['q-medium'] = mediumIdx[state.medium] !== undefined ? mediumIdx[state.medium] : 0;
  }
  if (state.lighting && state.expertSelections['q-lighting'] === undefined) {
    var lightIdx = { led: 0, hps: 1, cfl: 2, sunlight: 3 };
    state.expertSelections['q-lighting'] = lightIdx[state.lighting] !== undefined ? lightIdx[state.lighting] : 0;
  }

  while (currentId) {
    var node = TREE[currentId];
    if (!node) break;
    if (isResult(node)) {
      html += renderResultCard(node);
      reachedResult = true;
      break;
    }
    html += '<div class="expert-group fade-in">';
    html += '<label class="expert-label" for="expert-sel-' + depth + '">' + escapeHtml(node.question) + '</label>';
    html += '<select class="expert-select" id="expert-sel-' + depth + '" data-node="' + node.id + '" data-depth="' + depth + '">';
    html += '<option value="">Select...</option>';
    var sel = state.expertSelections[node.id];
    for (var i = 0; i < node.options.length; i++) {
      var selected = (sel === i) ? ' selected' : '';
      html += '<option value="' + i + '"' + selected + '>' + escapeHtml(node.options[i].label) + '</option>';
    }
    html += '</select>';
    if (node.help) html += '<div class="expert-help">' + escapeHtml(node.help) + '</div>';
    // Notes expander for expert mode
    var expertNote = state.wizardNotes[node.id] || '';
    html += renderNotesExpander(node.id, expertNote, 'wizardNotes');
    html += '</div>';

    if (sel !== undefined && sel !== null) {
      currentId = node.options[sel].next;
      depth++;
    } else {
      currentId = null;
    }
  }

  if (!reachedResult) {
    html += '<div class="nav-row" style="margin-top:8px"><button class="btn btn-secondary" id="btn-expert-reset" type="button">Reset All</button></div>';
  }
  return html;
}

/* ── Rendering: Multi-Dx Select ── */
function renderMultiDxSelect() {

  html += '<div class="stage-selector">';
  html += '<label>Growth Stage</label>';
  html += '<div class="stage-pills">';
  var stages = [

    { id: 'veg', label: 'Vegetative' },
    { id: 'early-flower', label: 'Early Flower (wk 1-3)' },
    { id: 'mid-flower', label: 'Mid Flower (wk 4-6)' },
    { id: 'late-flower', label: 'Late Flower (final 2\u20133 weeks)' }
  ];
  for (var si = 0; si < stages.length; si++) {
    var selected = multiDxState.stage === stages[si].id ? ' selected' : '';
    var isSelected19 = multiDxState.stage === stages[si].id;
    html += '<button class="stage-pill' + selected + '" type="button"'
         + ' aria-pressed="' + (isSelected19 ? 'true' : 'false') + '"'
         + ' data-stage="' + stages[si].id + '">'

  ];

    for (var syi = 0; syi < regionSymptoms.length; syi++) {

      html += '</label>';

    html += '</fieldset></div>';

  }

  var existingNote = multiDxState.notes['step-symptoms'] || '';
  html += renderNotesExpander('step-symptoms', existingNote, 'multiDxNotes');
  // Diagnose button

  html += '<button class="btn btn-primary" id="btn-diagnose" type="button"' + disabled + '>Diagnose (' + symCount + ' symptoms)</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

/* ── Rendering: Multi-Dx Results ── */
function renderMultiDxResults() {

    html += '<span class="result-sev ' + sevClass + '">' + escapeHtml(mdxSevLabel) + '</span>';

    if (diag.matchedSymptoms && diag.matchedSymptoms.length > 0) {
      var symLabels = [];
      for (var mi = 0; mi < diag.matchedSymptoms.length; mi++) {
        var sym = SYMPTOMS[diag.matchedSymptoms[mi]];

      html += '<div class="dx-supported-by">Supported by: ' + escapeHtml(symLabels.join(', ')) + '</div>';
    }
    html += '</div>';
  }
  // Combined Action Plan
  var plan = generateCombinedPlan(results, multiDxState.medium);

  html += '<div class="combined-plan-title">Combined Action Plan</div>';
  if (plan.checkFirst.length > 0) {
    html += '<div class="result-section"><div class="result-section-title">Check First</div><ol class="result-ol">';
    for (var ci = 0; ci < plan.checkFirst.length; ci++) {
      html += '<li>' + escapeHtml(plan.checkFirst[ci]) + '</li>';
    }
    html += '</ol></div>';
  }
  // Unified Fix Steps: merge personalized advice for top diagnosis + generic fixes
  var mdxNoteCtx = extractNoteContext(multiDxState.notes);
  var mdxTopAdvice = (multiDxState.results.length > 0) ? generateContextualAdvice(mdxNoteCtx, multiDxState.results[0].resultId) : [];
  var mdxHasPersonalized = mdxTopAdvice.length > 0;
  var mdxSectionTitle = mdxHasPersonalized ? 'Your Action Plan' : 'Fix Steps';

  html += '<div class="result-section">';
  html += '<div class="result-section-title' + (mdxHasPersonalized ? ' action-plan-title' : '') + '">' + escapeHtml(mdxSectionTitle) + '</div>';

  // Personalized steps first
  if (mdxHasPersonalized) {
    html += '<div class="action-plan-personalized">';
    for (var tai = 0; tai < mdxTopAdvice.length; tai++) {
      var taiItem = mdxTopAdvice[tai];
      var taiText = typeof taiItem === 'object' ? taiItem.text : taiItem;
      var taiPriority = typeof taiItem === 'object' ? (taiItem.priority || 5) : 5;
      var taiPrioClass = taiPriority >= 9 ? ' priority-critical' : (taiPriority >= 7 ? ' priority-important' : '');
      html += '<div class="action-step' + taiPrioClass + '">' + formatAdviceSteps(taiText) + '</div>';
    }
    html += '</div>';
  }

  // Generic fixes
  if (plan.fixes.length > 0) {
    if (mdxHasPersonalized) {
      html += '<details class="general-tips">';
      html += '<summary class="general-tips-toggle">General Tips</summary>';
      html += '<ol class="result-ol general-tips-list">';

    } else {
      html += '<ol class="result-ol">';
      for (var fi = 0; fi < plan.fixes.length; fi++) {
        html += '<li>' + escapeHtml(plan.fixes[fi]) + '</li>';
      }
      html += '</ol>';
    }
  }

  html += '</div>';

  if (plan.alsoConsider.length > 0) {
    html += '<div class="result-section"><div class="result-section-title">Also Consider</div><ul class="also-list">';
    for (var ai = 0; ai < plan.alsoConsider.length; ai++) {
      html += '<li class="also-item"><span class="also-name">' + escapeHtml(plan.alsoConsider[ai].name) + '</span>';
      if (plan.alsoConsider[ai].hint) html += ' &mdash; <span class="also-hint">' + escapeHtml(plan.alsoConsider[ai].hint) + '</span>';
      html += '</li>';
    }
    html += '</ul></div>';
  }
  html += '</div>';
  // Notes display
  var hasNotes = false;
  for (var nk in multiDxState.notes) {
    if (multiDxState.notes.hasOwnProperty(nk) && multiDxState.notes[nk]) { hasNotes = true; break; }
  }
  if (hasNotes) {
    html += '<div class="result-notes">';
    html += '<div class="result-notes-title">Your Notes</div>';
    for (var noteKey in multiDxState.notes) {
      if (!multiDxState.notes.hasOwnProperty(noteKey) || !multiDxState.notes[noteKey]) continue;
      html += '<div class="result-note-item">' + escapeHtml(multiDxState.notes[noteKey]) + '</div>';
    }
    html += '</div>';
  }
  // Action buttons
  html += '<div class="nav-row" style="margin-top: 20px;">';
  html += '<button class="btn btn-primary" id="btn-save-track" type="button">Save &amp; Start Tracking</button>';
  html += '<button class="btn btn-secondary" id="btn-mdx-back" type="button">Back</button>';

/* ── Rendering: Journal Dashboard ── */
function isAtStartingState() {
  if (state.mode === 'wizard') return state.currentNode === ROOT && state.history.length === 0;
  if (state.mode === 'expert') return Object.keys(state.expertSelections).length === 0;
  if (state.mode === 'multi-dx') return multiDxState.phase === 'select' && multiDxState.selectedSymptoms.length === 0;
  return false;
}

function renderJournalDashboard() {
  if (!journalData || !journalData.journal || journalData.journal.length === 0) return '';
  if (!isAtStartingState()) return '';

  var html = '<div class="journal-dashboard">';
  html += '<div class="journal-header">';
  html += '<div class="journal-title">Treatment Journal</div>';
  html += '</div>';

  var active = [];
  var resolved = [];
  for (var i = 0; i < journalData.journal.length; i++) {
    var e = journalData.journal[i];
    // Filter by active plant when one is selected; show entries with no plantId (pre-migration)
    if (activePlantId && e.plantId && e.plantId !== activePlantId) continue;
    if (e.status === 'resolved') resolved.push(e);
    else active.push(e);
  }

  active.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
  resolved.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });

  var entries = active.concat(resolved.slice(0, 3));

  for (var j = 0; j < entries.length; j++) {
    var entry = entries[j];
    var d = new Date(entry.createdAt);
    var dateStr = d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    var daysAgo = Math.floor((Date.now() - d.getTime()) / 86400000);

    var dxName = 'Unknown';
    if (entry.diagnoses && entry.diagnoses.length > 0) {
      var treeNode = TREE[entry.diagnoses[0].resultId];
      if (treeNode) dxName = treeNode.diagnosis;
      if (entry.diagnoses.length > 1) {
        var secondary = TREE[entry.diagnoses[1].resultId];
        if (secondary) dxName += ' + ' + secondary.diagnosis;

    html += '<article class="journal-entry" aria-label="Journal entry: ' + escapeHtml(dxName) + ', ' + escapeHtml(entry.status) + '">';
    html += '<div class="journal-entry-date">' + escapeHtml(dateStr) + '</div>';
    html += '<div class="journal-entry-dx">' + escapeHtml(dxName) + '</div>';
    html += '<div class="journal-entry-meta">';
    html += '<span class="journal-status status-' + escapeHtml(entry.status) + '">' + escapeHtml(entry.status) + '</span>';
    html += '<span class="journal-days">' + daysAgo + ' day' + (daysAgo !== 1 ? 's' : '') + ' ago</span>';
    html += '</div>';

    html += '<div style="margin-top: 8px; display: flex; gap: 6px; align-items: center;">';
    if (entry.status === 'active' || entry.status === 'treating') {
      html += '<button class="btn btn-secondary" data-checkin-id="' + escapeHtml(entry.id) + '" type="button" aria-label="Check in for: ' + escapeHtml(dxName) + '">Check In</button>';
    }
    html += '<button class="btn btn-secondary" data-dismiss-id="' + escapeHtml(entry.id) + '" type="button" aria-label="Remove ' + escapeHtml(dxName) + ' from journal" style="font-size:0.7rem;padding:4px 8px;color:var(--text3);">\u2715 Remove</button>';
    html += '</div>';

    html += '</article>';
  }

  html += '</div>';
  return html;
}

/* ── Check-In Processing ── */
function processCheckIn() {
  var entry = getJournalEntry(journalState.activeEntryId);
  if (!entry) return;

  var response = journalState.checkInData.response;
  var resolvedSymptoms = [];
  var newSymptoms = [];

  var resolvedChecks = document.querySelectorAll('.resolved-symptom:checked');
  for (var i = 0; i < resolvedChecks.length; i++) {
    resolvedSymptoms.push(resolvedChecks[i].value);
  }

  var newChecks = document.querySelectorAll('.new-symptom:checked');
  for (var j = 0; j < newChecks.length; j++) {
    newSymptoms.push(newChecks[j].value);
  }

  journalState.checkInData.previousScores = entry.diagnoses.slice();

  var originalSymptomCount = entry.symptoms ? entry.symptoms.length : 0;

  if (dataFileLoaded() && entry.symptoms && entry.symptoms.length > 0) {
    var updatedSymptoms = [];
    for (var k = 0; k < entry.symptoms.length; k++) {
      if (resolvedSymptoms.indexOf(entry.symptoms[k]) === -1) {
        updatedSymptoms.push(entry.symptoms[k]);
      }
    }
    for (var l = 0; l < newSymptoms.length; l++) {
      updatedSymptoms.push(newSymptoms[l]);
    }

    var treatedIds = entry.diagnoses.map(function(d) { return d.resultId; });
    var newScores = scoreDiagnoses(updatedSymptoms, entry.stage || 'veg', entry.medium || null, entry.lighting || null, treatedIds);
    journalState.checkInData.updatedScores = newScores;

    entry.symptoms = updatedSymptoms;
    entry.diagnoses = newScores.map(function(s, idx) {
      return { resultId: s.resultId, confidence: s.score, rank: idx + 1 };
    });
  }

  var notes = '';
  var notesInput = document.querySelector('.notes-textarea');
  if (notesInput) notes = notesInput.value.substring(0, 500);

  var daysSinceFix = null;
  var daysInput = document.getElementById('days-since-fix');
  if (daysInput) daysSinceFix = parseInt(daysInput.value, 10) || null;

  var record = createCheckInRecord(response, resolvedSymptoms, newSymptoms, notes);
  record.updatedScores = journalState.checkInData.updatedScores || null;
  if (daysSinceFix !== null) record.daysSinceFix = daysSinceFix;
  entry.checkIns.push(record);

  if (response === 'much-better' && resolvedSymptoms.length >= originalSymptomCount && originalSymptomCount > 0) {
    entry.status = 'resolved';
  }

  saveJournalState(journalData);
  journalState.view = 'check-in-result';
  render();
}

/* ── Journal Event Binding ── */
function bindJournalEvents() {
  // Dismiss/remove journal entry buttons
  var dismissBtns = document.querySelectorAll('[data-dismiss-id]');
  for (var di = 0; di < dismissBtns.length; di++) {
    dismissBtns[di].addEventListener('click', function() {
      var entryId = this.getAttribute('data-dismiss-id');
      var btn = this;
      // Two-click confirmation
      if (btn.getAttribute('data-confirm') === 'true') {
        // Remove entry from journal
        var newJournal = [];
        for (var dj = 0; dj < journalData.journal.length; dj++) {
          if (journalData.journal[dj].id !== entryId) newJournal.push(journalData.journal[dj]);
        }
        journalData.journal = newJournal;
        saveJournalState(journalData);
        invalidateSidebarCache();
        render();
      } else {
        btn.setAttribute('data-confirm', 'true');
        btn.textContent = 'Confirm remove?';
        btn.style.color = 'var(--red)';
        setTimeout(function() {
          btn.removeAttribute('data-confirm');
          btn.textContent = '\u2715 Remove';
          btn.style.color = 'var(--text3)';
        }, 3000);
      }
    });
  }

  var checkInBtns = document.querySelectorAll('[data-checkin-id]');
  for (var i = 0; i < checkInBtns.length; i++) {
    checkInBtns[i].addEventListener('click', function() {
      journalState.activeEntryId = this.getAttribute('data-checkin-id');
      journalState.view = 'check-in';
      journalState.checkInData = {};
      render();
    });
  }

  var responseBtns = document.querySelectorAll('[data-checkin-response]');
  for (var j = 0; j < responseBtns.length; j++) {
    responseBtns[j].addEventListener('click', function() {
      journalState.checkInData.response = this.getAttribute('data-checkin-response');
      journalState.view = 'check-in-detail';
      render();
    });
  }

  var cancelBtn = document.getElementById('btn-checkin-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', function() {
    journalState.view = 'dashboard';
    journalState.activeEntryId = null;
    render();
  });

  var backBtn = document.getElementById('btn-checkin-back');
  if (backBtn) backBtn.addEventListener('click', function() {
    journalState.view = 'check-in';
    render();
  });

  var submitBtn = document.getElementById('btn-checkin-submit');
  if (submitBtn) submitBtn.addEventListener('click', function() {
    processCheckIn();
  });

  var doneBtn = document.getElementById('btn-checkin-done');
  if (doneBtn) doneBtn.addEventListener('click', function() {
    journalState.view = 'dashboard';
    journalState.activeEntryId = null;
    render();
  });

  var treatmentChecks = document.querySelectorAll('.treatment-select input[type="checkbox"]');
  for (var tc = 0; tc < treatmentChecks.length; tc++) {
    treatmentChecks[tc].addEventListener('change', function() {
      this.closest('.treatment-select').classList.toggle('checked', this.checked);
    });
  }

  var startTrackBtn = document.getElementById('btn-start-tracking');
  if (startTrackBtn) startTrackBtn.addEventListener('click', function() {
    var checked = document.querySelectorAll('.treatment-select input:checked');
    var actions = [];
    for (var k = 0; k < checked.length; k++) {
      actions.push(checked[k].getAttribute('data-fix'));
    }
    var entry = getJournalEntry(journalState.activeEntryId);
    if (entry && actions.length > 0) {
      entry.treatments = createTreatments(actions);
      entry.status = 'treating';
      saveJournalState(journalData);
    }
    journalState.view = 'dashboard';
    render();
  });

  var skipBtn = document.getElementById('btn-skip-tracking');
  if (skipBtn) skipBtn.addEventListener('click', function() {
    journalState.view = 'dashboard';
    render();
  });

}

/* ── Rendering: Notes Expander ── */
function renderNotesExpander(stepId, existingContent, storageKey) {
  var content = existingContent || '';
  var isOpen = content.length > 0;
  var charCount = content.length;

  var html = '<div class="notes-expander">';
  html += '<button class="notes-toggle" type="button" data-notes-step="' + escapeHtml(stepId) + '"'
       + ' data-notes-store="' + escapeHtml(storageKey) + '"'
       + ' aria-expanded="' + (isOpen ? 'true' : 'false') + '">';
  html += '<span class="notes-toggle-icon' + (isOpen ? ' open' : '') + '" aria-hidden="true">&#9654;</span>';
  html += isOpen ? 'Notes' : 'Add context (improves diagnosis)';
  html += '</button>';
  html += '<div class="notes-body' + (isOpen ? ' open' : '') + '">';
  html += '<textarea class="notes-textarea" data-notes-step="' + escapeHtml(stepId) + '"'
       + ' data-notes-store="' + escapeHtml(storageKey) + '"'
       + ' maxlength="500"'
       + ' placeholder="e.g. pH 6.4, coco, LED, day 28 flower, watering every 2 days..."'
       + ' aria-label="Notes for this step">'
       + escapeHtml(content) + '</textarea>';

  var counterClass = 'notes-counter';
  if (charCount >= 500) counterClass += ' at-limit';
  else if (charCount >= 450) counterClass += ' near-limit';
  var limitHint = '';
  if (charCount >= 500) limitHint = '<span class="sr-only"> (limit reached)</span>';
  else if (charCount >= 450) limitHint = '<span class="sr-only"> (near limit)</span>';
  html += '<div class="' + counterClass + '" aria-live="polite">' + charCount + '/500' + limitHint + '</div>';
  html += '</div></div>';
  return html;
}

function bindNotesEvents() {
  // Toggle buttons
  var toggles = document.querySelectorAll('.notes-toggle');
  for (var i = 0; i < toggles.length; i++) {
    toggles[i].addEventListener('click', function() {
      var body = this.nextElementSibling;
      var icon = this.querySelector('.notes-toggle-icon');
      var isOpen = body.classList.contains('open');

      body.classList.toggle('open');
      icon.classList.toggle('open');
      this.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
      this.textContent = '';
      var newIcon = document.createElement('span');
      newIcon.className = 'notes-toggle-icon' + (!isOpen ? ' open' : '');
      newIcon.setAttribute('aria-hidden', 'true'); newIcon.innerHTML = '&#9654;';
      this.appendChild(newIcon);
      this.appendChild(document.createTextNode(!isOpen ? 'Notes' : 'Add context (improves diagnosis)'));

      if (!isOpen) {
        var textarea = body.querySelector('.notes-textarea');
        if (textarea) textarea.focus();
      }
    });
  }

  // Textarea input handlers
  var textareas = document.querySelectorAll('.notes-textarea');
  for (var j = 0; j < textareas.length; j++) {
    textareas[j].addEventListener('input', function() {
      var stepId = this.getAttribute('data-notes-step');
      var store = this.getAttribute('data-notes-store');
      var value = this.value.substring(0, 500);
      this.value = value;

      var counter = this.parentElement.querySelector('.notes-counter');
      if (counter) {
        counter.className = 'notes-counter';
        if (value.length >= 500) counter.className += ' at-limit';
        else if (value.length >= 450) counter.className += ' near-limit';
        var liveHint = '';
        if (value.length >= 500) liveHint = '<span class="sr-only"> (limit reached)</span>';
        else if (value.length >= 450) liveHint = '<span class="sr-only"> (near limit)</span>';
        counter.innerHTML = value.length + '/500' + liveHint;
      }

      if (store === 'wizardNotes') {
        state.wizardNotes[stepId] = value;
      } else if (store === 'multiDxNotes') {
        multiDxState.notes[stepId] = value;
      }
    });
  }
}

/* ── Grow Badges ── */
function renderGrowBadges() {
  if (!state.medium && !state.lighting) return '';
  var html = '<div class="grow-badges">';
  if (state.medium) {
    var mediumLabels = { soil: 'Soil', coco: 'Coco', hydro: 'Hydro', soilless: 'Soilless' };
    html += '<button class="grow-badge" id="badge-medium" type="button" aria-label="Growing medium: ' + escapeHtml(mediumLabels[state.medium] || state.medium) + '. Click to change.">';
    html += escapeHtml(mediumLabels[state.medium] || state.medium);
    html += '</button>';

  if (state.lighting) {
    var lightingLabels = { led: 'LED', hps: 'HPS', cfl: 'CFL', sunlight: 'Sunlight' };

/* ── Plant Sidebar Rendering ── */
var _lastSidebarPlantId = null;
var _lastSidebarHash = null;

function _computeSidebarHash() {
  // Simple hash: active plant + journal count — avoids full localStorage re-read when only notes change
  var jLen = journalData && journalData.journal ? journalData.journal.length : 0;
  return (activePlantId || 'none') + ':' + jLen;
}

function renderPlantSidebar(force) {
  var listEl = document.getElementById('plant-list');
  var mobileNameEl = document.getElementById('plant-mobile-name');
  if (!listEl) return;

  // Skip rebuild if nothing relevant changed (avoids localStorage read on every keystroke)
  var hash = _computeSidebarHash();
  if (!force && hash === _lastSidebarHash) return;
  _lastSidebarHash = hash;

  var plants = (typeof loadPlants === 'function') ? loadPlants() : [];
  var html = '';

  if (plants.length === 0) {
    html += '<div style="font-size:0.8rem;color:var(--text3);padding:12px 0;text-align:center;">No plants yet.<br>Add your first plant below.</div>';
  }

  for (var i = 0; i < plants.length; i++) {
    var p = plants[i];
    if (p.status === 'removed') continue;
    var isActive = (typeof activePlantId !== 'undefined' && activePlantId === p.id);
    var dxCount = 0;
    for (var j = 0; j < journalData.journal.length; j++) {
      if (journalData.journal[j].plantId === p.id) dxCount++;
    }

    html += '<div class="plant-card' + (isActive ? ' active' : '') + '" data-plant-id="' + escapeHtml(p.id) + '" role="option" aria-selected="' + (isActive ? 'true' : 'false') + '" tabindex="0">';
    html += '<button class="plant-card-edit" data-rename-id="' + escapeHtml(p.id) + '" type="button" aria-label="Rename ' + escapeHtml(p.name) + '" title="Rename">\u270E</button>';
    html += '<div class="plant-card-name" data-name-id="' + escapeHtml(p.id) + '">' + escapeHtml(p.name) + '</div>';
    if (p.strain || p.location) {
      html += '<div class="plant-card-meta">';
      if (p.strain) html += escapeHtml(p.strain);
      if (p.strain && p.location) html += ' \u00B7 ';
      if (p.location) html += escapeHtml(p.location);
      html += '</div>';
    }
    if (p.medium || p.lighting) {
      html += '<div class="plant-card-badges">';
      if (p.medium) {
        var medLabels = { soil: 'Soil', coco: 'Coco', hydro: 'Hydro', soilless: 'Soilless' };
        html += '<span class="plant-card-badge">' + escapeHtml(medLabels[p.medium] || p.medium) + '</span>';
      }
      if (p.lighting) {
        var litLabels = { led: 'LED', hps: 'HPS', cfl: 'CFL', sunlight: 'Sun' };
        html += '<span class="plant-card-badge">' + escapeHtml(litLabels[p.lighting] || p.lighting) + '</span>';
      }
      html += '</div>';
    }
    if (dxCount > 0) {
      html += '<span class="plant-card-dx-count">' + dxCount + '</span>';
    }
    html += '</div>';
  }

  listEl.innerHTML = html;

  // Update mobile strip
  if (mobileNameEl) {
    var activePlant = (typeof activePlantId !== 'undefined' && activePlantId && typeof getPlant === 'function') ? getPlant(activePlantId) : null;
    mobileNameEl.textContent = activePlant ? activePlant.name : 'No plant selected';
  }

  // Bind plant card clicks and keyboard events
  var cards = listEl.querySelectorAll('.plant-card');
  function handlePlantSelect(el) {
    var pid = el.getAttribute('data-plant-id');
    pushUndo('plant: ' + (getActivePlant() ? getActivePlant().name : 'none'));
    if (typeof setActivePlant === 'function') setActivePlant(pid);
    // Reset diagnosis state for new plant context
    if (state.medium && state.lighting) {
      state.currentNode = 'q-stage';
    } else {
      state.currentNode = ROOT;
    }
    state.history = [];
    state.wizardNotes = {};
    state.expertSelections = {};
    resetMultiDxState();
    journalState.view = 'dashboard';
    journalState.activeEntryId = null;
    invalidateSidebarCache();
    render();
  }
  for (var k = 0; k < cards.length; k++) {
    cards[k].addEventListener('click', function() {
      handlePlantSelect(this);
    });
    cards[k].addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handlePlantSelect(this);
      }
    });
  }

  // Bind rename buttons
  var renameBtns = listEl.querySelectorAll('.plant-card-edit');
  for (var rb = 0; rb < renameBtns.length; rb++) {
    renameBtns[rb].addEventListener('click', function(e) {
      e.stopPropagation(); // Don't trigger card select
      var pid = this.getAttribute('data-rename-id');
      var nameEl = listEl.querySelector('[data-name-id="' + pid + '"]');
      if (!nameEl) return;
      var currentName = nameEl.textContent;

      // Replace name with input
      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'plant-rename-input';
      input.value = currentName;
      input.maxLength = 50;
      input.setAttribute('aria-label', 'Rename plant');
      nameEl.textContent = '';
      nameEl.appendChild(input);
      input.focus();
      input.select();

      function commitRename() {
        var newName = input.value.trim();
        if (!newName) newName = currentName; // revert if empty
        if (typeof updatePlant === 'function') {
          updatePlant(pid, { name: newName });
        }
        invalidateSidebarCache();
        renderPlantSidebar();
      }

      input.addEventListener('blur', function() {
        commitRename();
      });
      input.addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') {
          ev.preventDefault();
          commitRename();
        } else if (ev.key === 'Escape') {
          ev.preventDefault();
          nameEl.textContent = currentName; // revert
          invalidateSidebarCache();
          renderPlantSidebar();
        }
      });
    });
  }
}

/* Force sidebar re-render when plants change (add/remove/switch) */
function invalidateSidebarCache() {
  _lastSidebarHash = null;
}

function renderAddPlantForm() {

  var html = '<div class="plant-form">';

  html += '<select class="plant-form-input" id="pf-medium">';
